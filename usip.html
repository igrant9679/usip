  const ACTION_OPTIONS = [
    {id:'notify.slack',   label:'Send Slack notification'},
    {id:'task.create',    label:'Create task'},
    {id:'sequence.enroll',label:'Enroll in sequence'},
    {id:'deal.advance',   label:'Advance deal stage'},
    {id:'qbr.schedule',   label:'Schedule QBR'},
  ];

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%', alignItems:'center'}});

  function render() {
    body.innerHTML = '';
    body.append(
      el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Workflow name'),
        el('input', {class:'input', value: draft.name, placeholder:'e.g., Welcome new hot leads',
          oninput: e => { draft.name = e.target.value; }})
      ),

      // Trigger stage
      el('div', {class:'wfb-stage trigger'},
        el('div', {class:'wfb-stage-head'},
          el('div', {class:'wfb-stage-label'}, '1 · WHEN (trigger)')
        ),
        el('select', {class:'input', onchange: e => { draft.trigger = {type: e.target.value}; render(); }},
          ...TRIGGER_OPTIONS.map(t => {
            const o = el('option', {value:t.id}, t.label);
            if (draft.trigger.type === t.id) o.setAttribute('selected', 'selected');
            return o;
          })
        ),
        // Trigger params
        draft.trigger.type === 'prospect.tier.changed' ? el('div', {style:{marginTop:'8px'}},
          el('label', {class:'form-label', style:{fontSize:'11px'}}, 'Target tier'),
          el('select', {class:'input', onchange: e => { draft.trigger.to = e.target.value; }},
            ...['cold','warm','hot','ready'].map(t => {
              const o = el('option', {value:t}, t.charAt(0).toUpperCase() + t.slice(1));
              if (draft.trigger.to === t) o.setAttribute('selected', 'selected');
              return o;
            })
          )
        ) : null,
        draft.trigger.type === 'deal.stalled' ? el('div', {style:{marginTop:'8px'}},
          el('label', {class:'form-label', style:{fontSize:'11px'}}, 'Stalled for N days'),
          el('input', {class:'input', type:'number', value: String(draft.trigger.days || 30),
            oninput: e => { draft.trigger.days = parseInt(e.target.value) || 30; }})
        ) : null,
        draft.trigger.type === 'customer.health.dropped' ? el('div', {style:{marginTop:'8px'}},
          el('label', {class:'form-label', style:{fontSize:'11px'}}, 'Below threshold'),
          el('input', {class:'input', type:'number', value: String(draft.trigger.below || 60),
            oninput: e => { draft.trigger.below = parseInt(e.target.value) || 60; }})
        ) : null,
        draft.trigger.type === 'customer.renewal.approaching' ? el('div', {style:{marginTop:'8px'}},
          el('label', {class:'form-label', style:{fontSize:'11px'}}, 'Days before renewal'),
          el('input', {class:'input', type:'number', value: String(draft.trigger.days || 90),
            oninput: e => { draft.trigger.days = parseInt(e.target.value) || 90; }})
        ) : null
      ),

      // Conditions stage
      el('div', {class:'wfb-stage condition'},
        el('div', {class:'wfb-stage-head'},
          el('div', {class:'wfb-stage-label'}, '2 · IF (conditions — optional)'),
          el('button', {class:'btn btn-sm', style:{marginLeft:'auto'},
            onclick: () => { draft.conditions.push({field:'p.owner', op:'equals', value:''}); render(); }
          }, el('span', {html:icon('plus',11)}), 'Add')

          el('div', {style:{display:'flex', gap:'8px', marginBottom:'6px'}},
            el('select', {class:'input', style:{flex:'1'},
              onchange: e => {

                draft.actions[ai] = {type: newType};
                render();
              }

              const o = el('option', {value:at.id}, at.label);
              if (a.type === at.id) o.setAttribute('selected', 'selected');
              return o;
            })),
            el('button', {class:'btn btn-sm',
              onclick: () => { draft.actions.splice(ai, 1); render(); }
            }, el('span', {html:icon('trash',12)}))
          ),
          // Per-action-type fields
          a.type === 'notify.slack' ? el('div', {style:{display:'grid', gridTemplateColumns:'1fr 2fr', gap:'6px'}},
            el('input', {class:'input', placeholder:'#channel', value: a.channel || '',
              oninput: e => { a.channel = e.target.value; }}),
            el('input', {class:'input', placeholder:'Message template', value: a.template || '',
              oninput: e => { a.template = e.target.value; }})
          ) : null,
          a.type === 'task.create' ? el('div', {style:{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:'6px'}},
            el('input', {class:'input', placeholder:'Task title', value: a.title || '',
              oninput: e => { a.title = e.target.value; }}),
            el('input', {class:'input', placeholder:'Assign to', value: a.assignTo || 'owner',
              oninput: e => { a.assignTo = e.target.value; }}),
            el('input', {class:'input', type:'number', placeholder:'Due in Nd', value: String(a.dueInDays || 1),
              oninput: e => { a.dueInDays = parseInt(e.target.value) || 1; }})
          ) : null,
          a.type === 'sequence.enroll' ? el('select', {class:'input',
            onchange: e => { a.sequenceName = e.target.value; }
          }, el('option', {value:''}, '— select sequence —'),
            ...(state.sequences || []).map(s => {
              const o = el('option', {value:s.name}, s.name);
              if (a.sequenceName === s.name) o.setAttribute('selected', 'selected');
              return o;
            })
          ) : null,
          a.type === 'deal.advance' ? el('select', {class:'input',
            onchange: e => { a.toStage = e.target.value; }
          }, ...STAGES.map(s => {
            const o = el('option', {value:s.id}, s.name);
            if (a.toStage === s.id) o.setAttribute('selected', 'selected');
            return o;
          })) : null
        ))
      )
    );
  }

  footer.append(
    isEdit ? el('button', {class:'btn btn-danger',
      onclick: () => {
        if (!confirm('Delete this workflow?')) return;
        state.workflows = state.workflows.filter(w => w.id !== existing.id);
        saveState(); closeModal(); renderView();
        toast('Workflow deleted');
      }
    }, el('span', {html:icon('trash',13)}), 'Delete') : null,
    el('div', {style:{flex:'1'}}),
    el('button', {class:'btn', onclick: closeModal}, 'Cancel'),
    el('button', {class:'btn btn-primary', onclick: () => {
      if (!draft.name.trim()) { toast('Name required', {kind:'error', icon:'alert'}); return; }
      if (!draft.actions.length) { toast('Add at least one action', {kind:'error', icon:'alert'}); return; }
      if (isEdit) {
        const idx = state.workflows.findIndex(w => w.id === existing.id);
        state.workflows[idx] = draft;
      } else {
        if (!state.workflows) state.workflows = [];
        state.workflows.unshift(draft);
      }
      saveState(); closeModal(); renderView();
      toast(isEdit ? 'Workflow saved' : 'Workflow created');
    }}, el('span', {html:icon('check',13)}), isEdit ? 'Save' : 'Create')
  );

  render();
  openModal({
    title: isEdit ? ['Edit ', el('em', {}, existing.name)] : ['New ', el('em', {}, 'workflow')],
    body, footer, size:'lg',
  });
}

/* ── Intelligence / Signals ── */
function renderIntelligence(root) {
  if (!state.signalFilter) state.signalFilter = 'all';
  const tabDefs = [
    {id:'all',      label:'All',      match: ()=>true},
    {id:'reply',    label:'Replies',  match: s => s.type === 'reply'},
    {id:'social',   label:'Social',   match: s => s.type === 'linkedin' || s.type === 'visit'},
    {id:'triggers', label:'Triggers', match: s => s.type === 'job-change' || s.type === 'funding'},
    {id:'news',     label:'News',     match: s => s.type === 'news'},
  ];
  const active = state.signalFilter;
  const counts = {};
  for (const t of tabDefs) counts[t.id] = state.signals.filter(t.match).length;
  const filtered = state.signals.filter(tabDefs.find(t=>t.id===active).match);

  root.append(el('div', {class:'page-header'},
    el('div', {}, el('h1', {class:'page-title'}, 'Signals'), el('div', {class:'page-subtitle'}, 'Prospect intelligence — job changes, news, engagement, funding')),
    el('div', {class:'page-actions'},
      el('button', {class:'btn'}, el('span',{html:icon('filter',14)}), 'Filter'),
      el('button', {class:'btn'}, el('span',{html:icon('refresh',14)}), 'Refresh')
    )
  ));
  const card = el('div', {class:'card'});
  const tabBar = el('div', {class:'sig-tabs'});
  for (const t of tabDefs) {
    tabBar.append(el('button', {class:'sig-tab'+(active===t.id?' active':''), onclick:()=>{ state.signalFilter = t.id; renderView(); }},
      t.label, el('span', {class:'count'}, '· ' + counts[t.id])
    ));
  }
  card.append(tabBar);
  if (!filtered.length) {
    card.append(el('div', {class:'empty'}, 'No signals in this category.'));
  } else {
    for (const s of filtered) card.append(renderSignalItem(s));
  }
  root.append(card);
}

function renderSignalItem(s) {
  const prospect = state.prospects.find(x => x.id === s.personId);
  // Pick sentiment/type badge text for reply signals
  let typeBadge = s.label;
  if (s.type === 'reply') typeBadge = 'Positive';
  else if (s.type === 'linkedin') typeBadge = 'Buying signal';
  else if (s.type === 'job-change') typeBadge = 'Job change';
  else if (s.type === 'news') typeBadge = 'News';
  else if (s.type === 'funding') typeBadge = 'Funding';
  else if (s.type === 'visit') typeBadge = 'Site visit';

  // Per-type action pair (from screenshot 3)
  let actions = [];
  if (s.type === 'reply') {
    actions = [
      {label:'Reply ↗', primary:true, onClick:()=> prospect && openAIComposer({prospect, intent:'Reply to their positive response: '+s.body})},
      {label:'Advance to Opportunity', onClick:()=> toast('Stage update coming next iteration')},
    ];
  } else if (s.type === 'linkedin') {
    actions = [
      {label:'Engage post ↗', primary:true, onClick:()=> toast('LinkedIn post opened externally')},
      {label:'Draft DM', onClick:()=> prospect && openAIComposer({prospect, intent:'Short friendly LinkedIn DM referencing their recent post'})},
    ];
  } else if (s.type === 'job-change') {
    actions = [
      {label:'Congratulate ↗', primary:true, onClick:()=> prospect && openAIComposer({prospect, intent:'Congratulate on their new role/company, light touch, no pitch'})},
      {label:'Add to sequence', onClick:()=> prospect ? openSequencePickerForProspect(prospect.id) : toast('No prospect linked to this signal')},
    ];
  } else if (s.type === 'news' || s.type === 'funding') {
    actions = [
      {label:'Draft outreach ↗', primary:true, onClick:()=> prospect && openAIComposer({prospect, intent:'Outreach referencing the news: '+s.body})},
      {label:'View account', onClick:()=> navigate('accounts')},
    ];
  } else {
    actions = [
      {label:'Draft outreach ↗', primary:true, onClick:()=> prospect && openAIComposer({prospect, intent:'Outreach triggered by: '+s.body})},
      {label:'Open contact', onClick:()=> openProspectDrawer(s.personId)},
    ];
  }

  return el('div', {class:'signal-item'},
    el('div', {class:'signal-header'},
      el('div', {class:'avatar avatar-sm', style:{background: avatarColor(s.person)}}, initials(s.person)),
      el('span', {class:'signal-person'}, s.person),
      el('span', {class:'badge', style:{background:s.bg, color:s.color, borderColor:'transparent'}}, typeBadge),
      el('span', {class:'signal-time'}, relTime(s.time))
    ),
    el('div', {class:'signal-body', style:{marginTop:'4px', marginLeft:'30px'}},
      el('div', {style:{color:'var(--text-3)', fontSize:'12px', marginBottom:'4px'}}, s.company + (prospect ? ' · ' + prospect.title : '') + ' · via ' + s.label),
      el('div', {style:{background:'var(--surface-2)', borderRadius:'var(--radius-md)', padding:'10px 12px', fontSize:'13px', color:'var(--text-2)', marginTop:'6px'}},
        '"' + s.body + '"'
      )
    ),
    el('div', {class:'signal-actions', style:{marginLeft:'30px'}}, ...actions.map(a =>
      el('button', {class:'btn btn-sm'+(a.primary?' btn-accent':''), onclick:a.onClick}, a.label)
    ))
  );
}

/* ── Tasks ── */
function renderTasks(root) {
  const now = new Date();
  const today = new Date(now.toDateString());
  const overdue = state.tasks.filter(t => !t.done && new Date(t.due) < today);
  const todays  = state.tasks.filter(t => !t.done && new Date(t.due).toDateString() === now.toDateString());
  const upcoming = state.tasks.filter(t => !t.done && new Date(t.due) > today && new Date(t.due).toDateString() !== now.toDateString());
  const done = state.tasks.filter(t => t.done);
  root.append(el('div', {class:'page-header'},
    el('div', {}, el('h1', {class:'page-title'}, 'Tasks'), el('div', {class:'page-subtitle'}, overdue.length+' overdue · '+todays.length+' today · '+upcoming.length+' upcoming')),
    el('div', {class:'page-actions'}, el('button', {class:'btn btn-primary'}, el('span',{html:icon('plus',14)}), 'New task'))
  ));
  const card = el('div', {class:'card'});
  function section(title, items, variant) {
    if (!items.length) return;
    card.append(el('div', {style:{padding:'12px 16px', borderBottom:'1px solid var(--border-soft)', background:'var(--surface-2)', fontSize:'11.5px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.04em', color: variant==='danger'?'var(--danger)':'var(--text-3)'}}, title+' · '+items.length));
    for (const t of items) card.append(renderTaskRow(t));
  }
  section('Overdue', overdue, 'danger');
  section('Today', todays);
  section('Upcoming', upcoming);
  section('Done', done);
  root.append(card);
}
function renderTaskRow(t) {
  return el('div', {class:'task-row'+(t.done?' done':''), onclick:()=>{ t.done = !t.done; saveState(); renderView(); }},
    el('div', {class:'checkbox'+(t.done?' checked':'')}, t.done ? el('span',{html:icon('check',10)}) : null),
    el('div', {class:'task-type-icon', style:{background:t.bg, color:t.color}}, el('span',{html:icon(t.icon,13)})),
    el('div', {class:'task-main'},
      el('div', {class:'task-title'}, t.title),
      el('div', {class:'task-meta'}, el('b',{},t.contact), ' · ', t.company, ' · due ', fmtDate(t.due))
    ),
    el('div', {class:'avatar avatar-sm', style:{background:avatarColor(t.assignee)}, title:t.assignee}, initials(t.assignee))
  );
}

function roleFromLabel(label) {
  // Map legacy free-text roles to a role id
  const l = (label || '').toLowerCase();
  if (l.includes('ceo') || l.includes('president') || l.includes('admin')) return 'admin';
  if (l.includes('manager') || l.includes('head of')) return 'manager';
  if (l.includes('sdr')) return 'sdr';
  if (l.includes('csm') || l.includes('success')) return 'csm';
  if (l.includes('engineer')) return 'engineer';
  if (l.includes('marketing')) return 'marketing';
  if (l.includes('ops')) return 'ops';
  if (l.includes('account executive') || l.includes(' ae') || l.includes('enterprise ae')) return 'ae';
  return 'viewer';
}
function roleLabel(id) { const r = ROLES.find(x => x.id === id); return r ? r.label : id; }
function roleCls(id)   { const r = ROLES.find(x => x.id === id); return r ? r.cls   : 'role-viewer'; }

// Normalize legacy team entries once on first render
function normalizeTeam() {
  let dirty = false;
  for (const m of state.team) {
    if (!m.roleId) { m.roleId = roleFromLabel(m.role); dirty = true; }
    if (m.status == null) { m.status = 'active'; dirty = true; }
    if (m.isAdmin == null) { m.isAdmin = (m.roleId === 'admin'); dirty = true; }
    if (!m.joined) { m.joined = daysAgo(randInt(20, 600)); dirty = true; }
  }
  if (dirty) saveState();
}

function toggleUserStatus(id) {
  const m = state.team.find(x => x.id === id);
  if (!m) return;
  // Guard: don't let the last active admin get disabled
  if (m.isAdmin && m.status === 'active') {
    const activeAdmins = state.team.filter(u => u.isAdmin && u.status === 'active').length;
    if (activeAdmins <= 1) { toast('Can\'t disable the last active admin', {kind:'error', icon:'alert'}); return; }
  }
  m.status = m.status === 'active' ? 'disabled' : 'active';
  saveState(); renderView(); renderSidebar();
  toast(m.name + ' ' + (m.status === 'active' ? 'enabled' : 'disabled'));
}

async function generateReplyDraft(conv, textarea) {
  const p = state.prospects.find(x => x.id === conv.contactId);
  if (!p) return;
  const lastThem = [...conv.messages].reverse().find(m => m.from === 'them');
  if (!lastThem) { toast('No message to reply to'); return; }
  textarea.value = '…drafting…';
  textarea.disabled = true;
  const persona = state.aiPersonality || defaultPersonality();
  const prompt = 'You are drafting a ' + conv.channel + ' reply on behalf of ' + (persona.signature || 'Idris Grant') + ', President & CEO of LSI Media. Voice profile: ' + persona.voiceProfile +
    '\n\nYou are replying to ' + p.name + ' (' + p.title + ' at ' + p.company + '). Their last message: "' + lastThem.body + '"\n\nWrite a short, natural ' + conv.channel + '-appropriate reply. Do not include a subject line. Do not include any salutation beyond a first name. Return ONLY the message body.';
  try {
    const reply = await llm.complete(prompt, {system: 'You write concise, human-sounding sales replies that match the specified voice profile.'});
    textarea.value = reply.trim();
  } catch (e) {
    textarea.value = 'Thanks for the note — happy to dig into this. Got 20 minutes this week to jump on a quick call?';
    toast('AI unavailable — used a fallback draft', {kind:'error', icon:'alert'});
  }
  textarea.disabled = false;
  textarea.focus();
}

async function generateReplyRefine(textarea, instruction) {
  const original = textarea.value.trim();
  if (!original) return;
  textarea.disabled = true;
  textarea.value = '…refining…';
  const prompt = 'Refine this draft reply: "' + original + '"\n\nInstruction: ' + instruction + '\n\nReturn ONLY the revised reply body.';
  try {
    const refined = await llm.complete(prompt, {system:'You edit short business messages without losing their meaning.'});
    textarea.value = refined.trim();
  } catch (e) {
    textarea.value = original;
    toast('AI unavailable', {kind:'error', icon:'alert'});
  }
  textarea.disabled = false;
  textarea.focus();
}
function renderReports(root) {
  const open = state.deals.filter(d => d.stage !== 'won');
  const won = state.deals.filter(d => d.stage === 'won').reduce((s,d)=>s+d.value, 0);
  // Forecast categories: won + commit (high prob) + best (mid prob) + pipeline (low prob)
  const commit = open.filter(d => d.winProb >= 70).reduce((s,d)=>s+d.value * (d.winProb/100), 0);
  const best   = open.filter(d => d.winProb >= 40 && d.winProb < 70).reduce((s,d)=>s+d.value * (d.winProb/100), 0);
  const pipe   = open.filter(d => d.winProb < 40).reduce((s,d)=>s+d.value * (d.winProb/100), 0);
  const quota = 4200000;
  const totalForecast = won + commit + best + pipe;
  const max = Math.max(totalForecast, quota);
  const seg = v => (v / max * 100).toFixed(2) + '%';
  const quotaPct = (quota / max * 100).toFixed(2);

  // Rep attainment (synthesized from state.team)
  const repData = [
    {name:'Idris Grant',    closed: won * 0.28, quota: 1000000},
    {name:'Priya Shah',     closed: won * 0.25, quota: 1000000},
    {name:'Noah Lindgren',  closed: won * 0.16, quota: 900000},
    {name:'Maya Okafor',    closed: won * 0.18, quota: 850000},
    {name:'Eli Bergström',  closed: won * 0.13, quota: 800000},
  ];
  repData.sort((a,b) => (b.closed/b.quota) - (a.closed/a.quota));

  // Risk flags from stalled deals
  const stalled = open.filter(d => d.daysInStage > 14).sort((a,b)=>b.value-a.value).slice(0, 4);
  const riskFlags = stalled.map(d => ({
    deal: d,
    category: d.winProb >= 60 ? 'commit' : 'best',
    reason: d.daysInStage > 30 ? (d.daysInStage + ' days in ' + STAGES.find(s=>s.id===d.stage).name + ' · no champion identified')
                               : (d.aiNote || ('No activity in ' + d.daysInStage + ' days')),
  }));

  const today = new Date();
  const qEnd = new Date(today.getFullYear(), 5, 30);
  const daysLeft = Math.max(0, Math.ceil((qEnd - today) / 86400000));

  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Revenue ', el('em',{}, 'intelligence')),
      el('div', {class:'page-subtitle'}, 'Q2 forecast · ' + daysLeft + ' days remaining · AI confidence: 82%')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn btn-primary'}, 'This quarter'),
      el('button', {class:'btn'}, 'Next quarter')
    )
  ));

  // Forecast vs quota
  root.append(el('div', {class:'forecast-card'},
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}},
      el('div', {style:{fontSize:'13px', fontWeight:'600'}}, 'Forecast vs quota'),
      el('div', {style:{fontSize:'12px', color:'var(--text-3)'}}, 'Quota: ', fmtMoney(quota))
    ),
    el('div', {class:'forecast-bar-wrap'},
      el('div', {class:'forecast-seg s-won', style:{flexBasis: seg(won)}}, won > max*0.05 ? fmtK(won) : ''),
      el('div', {class:'forecast-seg s-commit', style:{flexBasis: seg(commit)}}, commit > max*0.05 ? fmtK(commit) : ''),
      el('div', {class:'forecast-seg s-best', style:{flexBasis: seg(best)}}, best > max*0.05 ? fmtK(best) : ''),
      el('div', {class:'forecast-seg s-pipe', style:{flexBasis: seg(pipe)}}, pipe > max*0.05 ? fmtK(pipe) : ''),
      el('div', {class:'forecast-marker', style:{left: quotaPct + '%'}, 'data-label': 'Quota'})
    ),
    el('div', {class:'forecast-legend'},
      forecastLeg('#14532D', 'Closed won', fmtMoney(won)),
      forecastLeg('#16A34A', 'Commit',     fmtMoney(commit)),
      forecastLeg('#4ADE80', 'Best case',  fmtMoney(best)),
      forecastLeg('#A7F3D0', 'Pipeline',   fmtMoney(pipe))
    )
  ));

  // Two-column: rep attainment + risk flags
  root.append(el('div', {class:'wr-grid'},
    el('div', {class:'card'},
      el('div', {class:'card-header'}, el('div', {class:'card-title'}, 'Rep attainment')),
      el('div', {class:'card-body'}, ...repData.map(r => {
        const pct = Math.round(r.closed / r.quota * 100);
        const cls = pct >= 100 ? 'high' : pct >= 75 ? 'mid' : pct >= 40 ? 'low' : 'miss';
        return el('div', {class:'rep-row'},
          el('div', {class:'rep-main'},
            el('div', {class:'rep-name'}, r.name),
            el('div', {class:'rep-bar'}, el('div', {class:'rep-bar-fill '+cls, style:{width: Math.min(100, pct)+'%'}}))
          ),

    ),

      el('div', {class:'card-body'}, ...(riskFlags.length ? riskFlags.map(f =>
        el('div', {class:'risk-flag cat-'+f.category, onclick: () => openOpportunityDetail(f.deal.id), style:{cursor:'pointer'}},

function forecastLeg(color, label, value) {

/* ── Opportunity War Room (deal detail view) ── */
function openOpportunityDetail(id) {
  state.opportunityId = id;
  state.currentView = 'opportunity';
  saveState();
  renderSidebar();
  renderView();
  window.scrollTo(0, 0);
}

function renderOpportunity(root) {
  const deal = state.deals.find(d => d.id === state.opportunityId);
  if (!deal) {
    root.append(el('div', {class:'empty'}, 'Opportunity not found.'));
    return;
  }
  const stageIdx = STAGES.findIndex(s => s.id === deal.stage);
  const stage = STAGES[stageIdx];
  // Median days per stage (synthesized baselines)
  const medianDays = {new: 5, qualified: 8, demo: 10, proposal: 12, negotiation: 14, won: 0};
  const median = medianDays[deal.stage] || 10;
  const closeDate = new Date(Date.now() + Math.max(14, 60 - deal.daysInStage) * 86400000);

  // Buying committee — persisted on deal.committee, inferred from titles on first view
  const companyProspects = state.prospects.filter(p => p.company === deal.company).slice(0, 5);
  const roleFor = (p, i) => {
    const t = (p.title || '').toLowerCase();
    if (t.match(/\b(cfo|vp finance|director of finance|controller)\b/)) return {role:'Economic Buyer', status:'engaged'};
    if (t.match(/\b(ceo|president|executive director|founder|coo)\b/)) return {role:'Economic Buyer', status:'engaged'};
    if (t.match(/\b(cto|vp eng|director of (it|tech|engineering)|head of tech)\b/)) return {role:'Technical Buyer', status: i === 0 ? 'engaged' : 'nocontact'};
    if (t.match(/\b(program|marketing|operations|ops|product)\b/)) return {role:'Champion', status:'engaged'};
    return {role:'End User', status: 'nocontact'};
  };
  // One-time seeding: on first view, infer roles and persist so subsequent edits stick
  if (!deal.committee) {
    deal.committee = companyProspects.slice(0, 3).map((p, i) => ({
      id: uuid(), prospectId: p.id, ...roleFor(p, i),
    }));
    // Always include a gap row to surface unknown decision makers
    deal.committee.push({id: uuid(), prospectId: null, role: 'Unknown · decision maker', status: 'gap', meta: 'Board approval required'});
    saveState();
  }
  const committee = deal.committee.map(m => ({
    ...m,
    prospect: m.prospectId ? state.prospects.find(x => x.id === m.prospectId) : null,
  }));

  // Engagement timeline — synthesize from signals + activity for this deal's company
  const companySignals = state.signals.filter(s => s.company === deal.company).slice(0, 3);
  const tl = [];
  if (companySignals.length) {
    for (const s of companySignals) {
      let dotKind = 'neutral';
      if (s.type === 'reply') dotKind = 'positive';
      else if (s.type === 'news' || s.type === 'funding') dotKind = 'positive';
      else if (s.type === 'job-change') dotKind = 'warning';
      else if (s.type === 'linkedin' || s.type === 'visit') dotKind = 'neutral';
      tl.push({dot: dotKind, title: s.person + ' · ' + s.body.slice(0, 50) + (s.body.length > 50 ? '...' : ''), meta: relTime(s.time) + ' · ' + s.label});
    }
  }
  // Synthesized stage-transition events
  tl.push({dot: 'neutral', title: 'Proposal sent', meta: relTime(new Date(Date.now() - (deal.daysInStage - 2) * 86400000)) + ' · Email'});
  tl.push({dot: 'warning', title: 'Discovery call · 42 min', meta: relTime(new Date(Date.now() - (deal.daysInStage + 3) * 86400000)) + ' · Zoom'});
  tl.push({dot: 'muted', title: stage.name + ' stage began', meta: relTime(new Date(Date.now() - deal.daysInStage * 86400000))});

  const winAIProb = deal.winProb;
  const winManual = Math.max(20, Math.min(95, winAIProb - 10 - Math.floor(Math.random() * 10)));
  const probColor = winAIProb >= 65 ? 'var(--success)' : winAIProb >= 40 ? 'var(--warning)' : 'var(--danger)';

  // Header with back button
  root.append(el('div', {class:'page-header'},
    el('div', {style:{display:'flex', alignItems:'center', gap:'12px', flex:'1'}},
      el('button', {class:'btn btn-sm', onclick: () => navigate('pipeline')},
        el('span', {html:icon('chevLeft', 12)}), 'Pipeline'
      ),
      el('div', {class:'breadcrumb-sep', style:{color:'var(--text-3)'}}, '/'),
      el('div', {style:{fontSize:'13px', color:'var(--text-3)'}}, deal.company)
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn'}, el('span', {html:icon('share', 13)}), 'Share'),
      el('button', {class:'btn btn-primary', onclick: () => openAIComposer({
        prospect: companyProspects[0],
        intent: 'Follow-up on ' + deal.name + ' — advance to ' + (STAGES[stageIdx+1] ? STAGES[stageIdx+1].name : 'close')
      })}, el('span', {html:icon('sparkles', 13)}), 'Draft email')
    )
  ));

  // wr-head: title + subtitle + AI probability
  root.append(el('div', {class:'wr-head'},
    el('div', {class:'wr-head-main'},
      el('div', {style:{fontSize:'11.5px', color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:'500', marginBottom:'4px'}}, 'Opportunity'),
      el('h1', {style:{fontFamily:'var(--font-display)', fontSize:'26px', fontWeight:'400', letterSpacing:'-0.015em', lineHeight:'1.15', margin:'0 0 6px'}},
        deal.company, ' · ', el('em', {style:{color:'var(--accent)'}}, deal.name.split('—')[1] ? deal.name.split('—')[1].trim() : deal.name)
      ),
      el('div', {style:{fontSize:'13px', color:'var(--text-3)'}},
        fmtMoney(deal.value), ' · ', stage.name, ' · close ', fmtDate(closeDate), ' · owner ', el('b', {style:{color:'var(--text-2)'}}, deal.owner)
      )
    ),
    el('div', {class:'wr-head-prob'},
      el('div', {class:'wr-prob-label'}, 'AI win probability'),
      el('div', {class:'wr-prob-val', style:{color: probColor}}, winAIProb + '%'),
      el('div', {class:'wr-prob-manual'}, 'Manual: ' + winManual + '%')
    )
  ));

  // Stage progress bar
  const stageBar = el('div', {class:'card', style:{padding:'16px 20px', marginBottom:'16px'}});
  const barRow = el('div', {class:'wr-stage-bar'});
  for (let i = 0; i < STAGES.length - 1; i++) {
    const s = STAGES[i];
    let cls = '';
    let label = s.name;
    if (i < stageIdx) { cls = 'done'; label = s.name + ' ✓'; }
    else if (i === stageIdx) { cls = 'current'; label = s.name + ' ●'; }
    barRow.append(el('div', {class:'wr-stage-seg '+cls}, label));
  }
  // add Closed as final segment
  barRow.append(el('div', {class:'wr-stage-seg'+ (deal.stage === 'won' ? ' current' : '')}, 'Closed'));
  stageBar.append(barRow);
  stageBar.append(el('div', {style:{fontSize:'12px', color:'var(--text-3)', marginTop:'6px'}},
    deal.daysInStage + ' days in ' + stage.name + ' · median for this stage: ' + median + ' days'
  ));
  root.append(stageBar);

  // Next best action
  const nbaBody = buildOppNBA(deal, committee, stage);
  root.append(el('div', {class:'wr-nba'},
    el('div', {class:'wr-nba-head'},
      el('span', {class:'wr-nba-tag'}, 'Next best action'),
      el('span', {class:'wr-nba-conf'}, 'high confidence · based on 84 similar deals')
    ),
    el('div', {class:'wr-nba-body'}, nbaBody),
    el('div', {style:{display:'flex', gap:'8px', flexWrap:'wrap'}},
      el('button', {class:'btn btn-accent btn-sm', onclick: () => openAIComposer({
        prospect: companyProspects[0], intent: nbaBody
      })}, el('span', {html:icon('sparkles', 12)}), 'Draft email'),
      el('button', {class:'btn btn-sm'}, el('span', {html:icon('calendar', 12)}), 'Schedule call'),
      el('button', {class:'btn btn-sm', onclick: () => toast('NBA dismissed · AI will suggest another')}, 'Dismiss')
    )
  ));

  // Two-column grid: committee + timeline
  const ROLES = ['Economic Buyer', 'Champion', 'Technical Buyer', 'End User', 'Unknown · decision maker'];
  const STATUSES = [
    {id:'engaged',   label:'Engaged'},
    {id:'nocontact', label:'No contact'},
    {id:'gap',       label:'Gap'},
  ];

  const committeeCard = el('div', {class:'card'},
    el('div', {class:'card-header'},
      el('div', {class:'card-title'}, 'Buying committee', el('span', {class:'tag'}, String(deal.committee.length))),
      el('button', {class:'btn btn-sm btn-ghost', onclick: () => openCommitteeAddModal(deal)},
        el('span', {html:icon('plus',12)}), 'Add member'
      )
    )
  );
  const cBody = el('div', {class:'card-body'});
  for (const m of committee) {
    const row = el('div', {class:'committee-editor-row'});
    row.append(
      m.prospect
        ? el('div', {class:'avatar', style:{background: avatarColor(m.prospect.name)}}, initials(m.prospect.name))
        : el('div', {class:'avatar', style:{background:'var(--border-strong)', color:'var(--text-3)'}}, '?'),
      el('div', {style:{minWidth:'0'}},
        el('div', {class:'committee-name', style:{cursor: m.prospect ? 'pointer' : 'default'},
          onclick: () => { if (m.prospect) openProspectDrawer(m.prospect.id); }
        }, m.prospect ? m.prospect.name : 'Unknown'),
        el('div', {class:'committee-role'}, m.prospect ? (m.prospect.title || '—') : (m.meta || 'No contact identified'))
      ),
      // Editable role dropdown
      el('select', {
        class:'committee-role-sel',
        onchange: e => {
          const stored = deal.committee.find(x => x.id === m.id);
          if (stored) { stored.role = e.target.value; saveState(); }
        },
      }, ...ROLES.map(r => {
        const o = el('option', {value: r}, r);
        if (m.role === r) o.setAttribute('selected', 'selected');
        return o;
      })),
      // Editable status pill (cycles through on click)
      el('span', {
        class: 'committee-status ' + m.status,
        style: {cursor:'pointer'},
        title: 'Click to cycle status',
        onclick: () => {
          const stored = deal.committee.find(x => x.id === m.id);
          if (!stored) return;
          const order = ['engaged', 'nocontact', 'gap'];
          const idx = order.indexOf(stored.status);
          stored.status = order[(idx + 1) % order.length];
          saveState(); renderView();
        },
      },
        m.status === 'engaged' ? 'Engaged' :
        m.status === 'nocontact' ? 'No contact' :
        m.status === 'gap' ? 'Gap' : m.status
      ),
      // Remove button
      el('button', {
        class:'btn btn-sm btn-ghost',
        title:'Remove from committee',
        onclick: () => {
          if (!confirm('Remove this member from the buying committee?')) return;
          deal.committee = deal.committee.filter(x => x.id !== m.id);
          saveState(); renderView();
          toast('Removed from committee');
        },
      }, el('span', {html:icon('x', 12)}))
    );
    cBody.append(row);
  }
  committeeCard.append(cBody);

  const timelineCard = el('div', {class:'card'},
    el('div', {class:'card-header'}, el('div', {class:'card-title'}, 'Engagement timeline'))
  );
  const tBody = el('div', {class:'card-body'});
  for (const ev of tl) {
    tBody.append(el('div', {class:'tl-item'},
      el('div', {class:'tl-dot '+ev.dot}),
      el('div', {class:'tl-line'},
        el('div', {class:'tl-title'}, ev.title),
        el('div', {class:'tl-meta'}, ev.meta)
      )
    ));
  }
  timelineCard.append(tBody);

  root.append(el('div', {class:'wr-grid'}, committeeCard, timelineCard));
}

function buildOppNBA(deal, committee, stage) {
  const econBuyer = committee.find(c => c.role === 'Economic Buyer');
  const champion = committee.find(c => c.role === 'Champion');
  const techGap = committee.find(c => c.role === 'Technical Buyer' && c.status === 'nocontact');
  if (deal.stage === 'proposal' && econBuyer) {
    return 'Send ROI case study to ' + econBuyer.prospect.name + ' (Economic Buyer) — they opened the proposal but haven\'t engaged with the pricing appendix. Historical pattern: champions at this stage respond well to peer validation from comparable organizations.';
  }
  if (deal.stage === 'negotiation' && deal.daysInStage > 10) {
    return 'Legal review is running ' + (deal.daysInStage - 10) + ' days over median. Escalate to ' + (econBuyer ? econBuyer.prospect.name : 'executive sponsor') + ' with a specific close-date ask and offer to jump on a 15-min call to unblock.';
  }
  if (techGap) {
    return 'Technical Buyer ' + techGap.prospect.name + ' has had no contact yet. Get ' + (champion ? champion.prospect.name : 'your champion') + ' to make an intro — deals of this size close 2.3× more often when the technical buyer is engaged before proposal.';
  }
  if (deal.stage === 'qualified' || deal.stage === 'demo') {
    return 'Schedule a discovery session focused on implementation timeline and success metrics. Based on similar deals in ' + stage.name + ', surfacing a concrete 90-day plan now accelerates the proposal stage by ~40%.';
  }
  if (deal.daysInStage > 20) {
    return 'This deal has been in ' + stage.name + ' for ' + deal.daysInStage + ' days — above median. Either advance it with a specific ask in the next 48 hours or move it to a nurture track to keep the pipeline clean.';
  }
  return deal.aiNote || 'Maintain cadence — ' + deal.company + ' is progressing on expected timeline. Confirm next meeting before ' + fmtDate(new Date(Date.now() + 7 * 86400000)) + ' to prevent stall.';
}

/* ── Committee add modal (Path B) ── */
function openCommitteeAddModal(deal) {
  const ROLES = ['Economic Buyer', 'Champion', 'Technical Buyer', 'End User', 'Unknown · decision maker'];
  const draft = {
    source: 'existing', // 'existing' | 'placeholder'
    prospectId: null,
    role: 'Champion',
    status: 'nocontact',
    meta: '',
  };
  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%'}});

  function render() {
    body.innerHTML = '';
    body.append(
      el('div', {style:{fontSize:'12.5px', color:'var(--text-3)', marginBottom:'12px', lineHeight:'1.5'}},
        'Add someone to the buying committee for this deal. Link to an existing contact from ',
        el('b', {style:{color:'var(--text)'}}, deal.company),
        ', or add a placeholder for an unknown decision maker.'
      ),
      el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Type'),
        el('div', {style:{display:'flex', gap:'8px'}},
          el('button', {
            class:'btn'+(draft.source==='existing'?' btn-primary':''),
            onclick: () => { draft.source = 'existing'; render(); },
          }, 'Existing contact'),
          el('button', {
            class:'btn'+(draft.source==='placeholder'?' btn-primary':''),
            onclick: () => { draft.source = 'placeholder'; render(); },
          }, 'Placeholder (unknown)')
        )
      )
    );

    if (draft.source === 'existing') {
      // Show contacts at this company that aren't already in the committee
      const inCommittee = new Set(deal.committee.map(m => m.prospectId).filter(Boolean));
      const companyContacts = state.prospects.filter(p => p.company === deal.company && !inCommittee.has(p.id));

      if (!companyContacts.length) {
        body.append(el('div', {style:{padding:'14px', background:'var(--warning-bg)', border:'1px solid var(--warning-soft)', borderRadius:'var(--radius-md)', fontSize:'12.5px', color:'var(--text-2)', lineHeight:'1.5'}},
          'All contacts at ' + deal.company + ' are already on the committee, or there are none. Try adding a placeholder instead.'
        ));
      } else {
        body.append(el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Contact'),
          el('select', {
            class:'input',
            onchange: e => { draft.prospectId = e.target.value || null; },
          },
            el('option', {value:''}, '— select a contact at ' + deal.company + ' —'),
            ...companyContacts.map(p => {
              const o = el('option', {value: p.id}, p.name + ' · ' + (p.title || '—'));
              if (draft.prospectId === p.id) o.setAttribute('selected','selected');
              return o;
            })
          )
        ));
      }
    } else {
      body.append(el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Placeholder note'),
        el('input', {class:'input', placeholder:'e.g., Board approval required',
          oninput: e => { draft.meta = e.target.value; }})
      ));
    }

    body.append(
      el('div', {class:'form-grid-2'},
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Role'),
          el('select', {class:'input', onchange: e => { draft.role = e.target.value; }},
            ...ROLES.map(r => {
              const o = el('option', {value:r}, r);
              if (draft.role === r) o.setAttribute('selected','selected');
              return o;
            })
          )
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Engagement'),
          el('select', {class:'input', onchange: e => { draft.status = e.target.value; }},
            ...[{id:'engaged',label:'Engaged'},{id:'nocontact',label:'No contact'},{id:'gap',label:'Gap'}].map(s => {
              const o = el('option', {value:s.id}, s.label);
              if (draft.status === s.id) o.setAttribute('selected','selected');
              return o;
            })
          )
        )
      )
    );
  }

  footer.append(
    el('button', {class:'btn', onclick: closeModal}, 'Cancel'),
    el('div', {style:{flex:'1'}}),
    el('button', {class:'btn btn-primary', onclick: () => {
      if (draft.source === 'existing' && !draft.prospectId) { toast('Pick a contact first', {kind:'error', icon:'alert'}); return; }
      const newMember = {
        id: uuid(),
        prospectId: draft.source === 'existing' ? draft.prospectId : null,
        role: draft.role,
        status: draft.status,
      };
      if (draft.source === 'placeholder' && draft.meta) newMember.meta = draft.meta;
      deal.committee.push(newMember);
      saveState(); closeModal(); renderView();
      toast('Added to committee');
    }}, el('span', {html:icon('plus',13)}), 'Add to committee')
  );

  render();
  openModal({
    title: ['Add to ', el('em', {}, deal.company), ' committee'],
    body, footer,
  });
}

/* ── AI Personality configurator ── */
function openAIPersonality() {
  const draft = {...(state.aiPersonality || defaultPersonality())};
  if (!draft.prohibitedWords) draft.prohibitedWords = [];

  const PRESETS = [
    {id:'enterprise',  name:'Enterprise',  emoji:'🏛️', desc:'Measured, consultative, peer-to-peer. Best for deals $50k+ with multiple stakeholders.'},
    {id:'founder',     name:'Founder',     emoji:'🚀', desc:'Direct, confident, a little irreverent. Skips the corporate hedging. Great for SaaS and startups.'},
    {id:'concierge',   name:'Concierge',   emoji:'✨', desc:'Warm, service-oriented, attentive to detail. Ideal for high-touch relationship sales and CSM work.'},
    {id:'analyst',     name:'Analyst',     emoji:'📊', desc:'Data-forward, benchmark-heavy, precise. Works best with technical buyers and CFOs.'},

/* ═══════ 9. Modal + Drawer primitives ═══════ */
function openModal({title, body, footer, size=''}) {
  closeModal();
  const backdrop = el('div', {class:'modal-backdrop', onclick: e => { if (e.target === backdrop) closeModal(); }});
  const modal = el('div', {class:'modal '+(size==='lg'?'modal-lg':'')});
  modal.append(
    el('div', {class:'modal-head'},
      el('h2', {class:'modal-title'}, ...(Array.isArray(title) ? title : [title])),
      el('button', {class:'modal-close', onclick:closeModal, title:'Close'}, el('span',{html:icon('x',16)}))
    ),
    el('div', {class:'modal-body'}, body),
    footer ? el('div', {class:'modal-foot'}, footer) : null
  );
  backdrop.append(modal);
  $('#modal-root').append(backdrop);
  document.addEventListener('keydown', escCloseModal);
}
function closeModal() {
  $('#modal-root').innerHTML = '';
  document.removeEventListener('keydown', escCloseModal);
}
function escCloseModal(e) { if (e.key === 'Escape') closeModal(); }

function openDrawer({head, body, footer}) {
  closeDrawer();
  const bd = el('div', {class:'drawer-backdrop', onclick:closeDrawer});
  const dr = el('div', {class:'drawer'});
  dr.append(

    footer ? el('div', {class:'drawer-foot'}, footer) : null
  );
  $('#drawer-root').append(bd, dr);
  document.addEventListener('keydown', escCloseDrawer);
}
function closeDrawer() { $('#drawer-root').innerHTML = ''; document.removeEventListener('keydown', escCloseDrawer); }
function escCloseDrawer(e) { if (e.key === 'Escape') closeDrawer(); }

/* ═══════ 10. CSV Import Modal (REAL — works on real files) ═══════ */
function openImportModal() {
  let parsed = null;
  let mapping = null;

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', marginLeft:'auto'}});

  function importStat(label, value, kind='') {
    return el('div', {class:'import-stat '+kind},
      el('div', {class:'import-stat-label'}, label),
      el('div', {class:'import-stat-value'}, typeof value === 'number' ? value.toLocaleString() : value)
    );
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        parsed = parseCSV(reader.result);
        if (!parsed.rows.length) { toast('CSV is empty or could not be read', {kind:'error', icon:'alert'}); return; }
        renderStep(); renderFooter();
      } catch (e) {
        toast('Could not parse CSV: '+e.message, {kind:'error', icon:'alert'});
      }
    };
    reader.onerror = () => toast('Failed to read file', {kind:'error', icon:'alert'});
    reader.readAsText(file);
  }

  function renderStep() {
    body.innerHTML = '';
    if (!parsed) {
      const dz = el('div', {class:'import-dropzone'},
        el('div', {style:{color:'var(--accent)', display:'flex', justifyContent:'center'}, html:icon('upload',32)}),
        el('h3', {}, 'Drop a CSV file here'),
        el('p', {}, "or click to select — we'll auto-detect columns."),
        el('input', {type:'file', accept:'.csv,text/csv', style:{display:'none'}, id:'csv-file',
          onchange: e => { if (e.target.files[0]) loadFile(e.target.files[0]); }})
      );
      dz.addEventListener('click', () => $('#csv-file').click());
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
      dz.addEventListener('drop', e => {
        e.preventDefault(); dz.classList.remove('drag');
        const f = e.dataTransfer.files[0]; if (f) loadFile(f);
      });
      body.append(dz,
        el('div', {style:{marginTop:'16px', padding:'12px 14px', background:'var(--surface-2)', borderRadius:'var(--radius-md)', fontSize:'12px', color:'var(--text-3)', lineHeight:'1.5'}},
          el('b', {style:{color:'var(--text-2)'}}, 'Expected columns: '),
          'name, email, title, company, phone, linkedin, location, industry, tags. ',
          'Column names can be close variants (e.g. "First Name", "email_address", "Job Title") — we will auto-map them.'
        )
      );
      return;
    }
    const sampleRows = parsed.rows.slice(0, 5);
    if (!mapping) mapping = autoMapColumns(parsed.headers, sampleRows);
    const validRows = parsed.rows.filter(r => {
      const hasName = (mapping.name != null && r[mapping.name] && r[mapping.name].trim())
        || (mapping.firstName != null && r[mapping.firstName] && r[mapping.firstName].trim())
        || (mapping.lastName != null && r[mapping.lastName] && r[mapping.lastName].trim());
      const hasEmail = mapping.email != null && r[mapping.email] && r[mapping.email].trim();
      return hasName || hasEmail;
    }).length;
    const withEmail = mapping.email != null ? parsed.rows.filter(r => r[mapping.email] && r[mapping.email].trim()).length : 0;
    const existingEmails = new Set(state.prospects.map(p => (p.email||'').toLowerCase()));
    const wouldDupe = mapping.email != null ? parsed.rows.filter(r => r[mapping.email] && existingEmails.has(r[mapping.email].trim().toLowerCase())).length : 0;
    const unmapped = mapping.email == null && mapping.name == null && mapping.firstName == null && mapping.lastName == null;

    body.append(
      el('div', {class:'import-summary'},
        importStat('Total rows', parsed.rows.length),
        importStat('Valid rows', validRows, validRows === parsed.rows.length ? 'success' : 'warn'),
        importStat('With email', withEmail),
        importStat('Dupes', wouldDupe, wouldDupe > 0 ? 'warn' : 'success')
      ),
      el('div', {class:'form-label', style:{marginTop:'8px'}}, 'Column mapping'),
      el('div', {class:'import-mapping'}, ...FIELD_DEFS.map(f => {
        const sel = el('select', {class:'input', style:{width:'100%'},
          onchange: e => { mapping[f.key] = e.target.value === '' ? null : +e.target.value; renderStep(); }},
          el('option', {value:''}, '— not mapped —'),
          ...parsed.headers.map((h, i) => {
            const opt = el('option', {value: String(i)}, h || ('Column '+(i+1)));
            if (mapping[f.key] === i) opt.setAttribute('selected', 'selected');
            return opt;
          })
        );
        return el('div', {class:'import-mapping-row'},
          el('div', {style:{fontWeight:'500', fontSize:'13px'}}, f.label,
            (f.key === 'email' || f.key === 'name' || f.key === 'firstName') ? el('span', {style:{color:'var(--danger)', marginLeft:'4px'}}, '*') : null
          ),
          el('div', {class:'import-arrow'}, '→'),
          sel
        );
      })),
      unmapped ? el('div', {style:{color:'var(--danger)', fontSize:'12.5px', marginBottom:'12px'}},
        el('span', {html:icon('alert',14), style:{display:'inline-flex', verticalAlign:'middle', marginRight:'6px'}}),
        'Map at least one of: Full name, First name, or Email.'
      ) : null,
      el('div', {class:'form-label'}, 'Preview · first '+sampleRows.length+' rows'),
      el('div', {class:'import-preview'},
        el('table', {},
          el('thead', {}, el('tr', {}, ...parsed.headers.map(h => el('th', {}, h || '—')))),
          el('tbody', {}, ...sampleRows.map(r => el('tr', {}, ...parsed.headers.map((_, i) => el('td', {}, r[i] || '')))))
        )
      )
    );
  }

  function renderFooter() {
    footer.innerHTML = '';
    footer.append(el('button', {class:'btn', onclick:closeModal}, 'Cancel'));
    if (parsed) {
      footer.append(
        el('button', {class:'btn', onclick: () => { parsed = null; mapping = null; renderStep(); renderFooter(); }}, 'Back'),
        el('button', {class:'btn btn-accent',
          onclick: () => {
            const ok = mapping && (mapping.email != null || mapping.name != null || mapping.firstName != null || mapping.lastName != null);
            if (!ok) { toast('Map at least one of: Full name, First name, or Email', {kind:'error', icon:'alert'}); return; }
            const result = runImport(parsed, mapping);
            closeModal();
            toast('Imported '+result.created+' prospects ('+result.dupes+' dupes skipped, '+result.newCompanies+' new accounts)', {duration:4000});
            renderSidebar(); renderView();
          }
        }, el('span', {html:icon('check',14)}), 'Import '+parsed.rows.length+' rows')
      );
    }
  }

  renderStep(); renderFooter();
  openModal({title: ['Import ', el('em',{},'prospects'), ' from CSV'], body, footer, size:'lg'});
}

/* ═══════ 11. AI Composer (REAL — calls Claude / OpenAI) ═══════ */
function openAIComposer(opts = {}) {
  let prospect = opts.prospect || null;
  let intent = opts.intent || '';
  let output = '';
  let loading = false;
  let lengthHint = 'short';

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', marginLeft:'auto'}});

  function render() {
    body.innerHTML = '';
    const persona = state.aiPersonality || defaultPersonality();
    body.append(
      el('div', {class:'ai-gen-box'},
        el('div', {class:'ai-spark'}, el('span', {html:icon('sparkles',18)})),
        el('div', {style:{flex:'1'}},
          el('div', {class:'ai-gen-title'}, 'Drafting via '+llm.providerLabel()+' · '+(state.llm.provider === 'anthropic' ? state.llm.anthropicModel : state.llm.openaiModel)),
          el('div', {class:'ai-gen-sub'}, llm.isConfigured() ? 'Ready. Pick a prospect and describe your intent below.' : 'No API key configured. Add one in Settings.')
        ),
        el('div', {style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'6px'}},
          el('button', {
            class:'btn btn-sm',
            onclick: () => { closeModal(); setTimeout(() => openAIPersonality(), 50); },
            title:'Configure AI Personality',
          },
            el('span', {html:icon('sparkles',12), style:{color:'var(--accent)', display:'inline-flex'}}),
            'Persona: ', el('b', {style:{textTransform:'capitalize', marginLeft:'2px'}}, persona.preset || 'enterprise')
          ),
          el('button', {class:'btn btn-sm', onclick:()=>{ closeModal(); navigate('settings'); }}, 'Settings')
        )
      ),
      el('div', {class:'form-grid-2'},
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Prospect'),
          el('select', {class:'input',
            onchange: e => { prospect = state.prospects.find(p => p.id === e.target.value) || null; render(); }
          },
            el('option', {value:''}, '— select prospect —'),
            ...state.prospects.slice(0, 200).map(p => {
              const o = el('option', {value: p.id}, p.name+' · '+(p.title||'-')+' · '+p.company);
              if (prospect && prospect.id === p.id) o.setAttribute('selected', 'selected');
              return o;
            })
          )
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Length'),
          el('select', {class:'input', onchange: e => { lengthHint = e.target.value; }},
            ...[['short','Short (60-90 words)'],['medium','Medium (100-140)'],['long','Long (150-220)']].map(arr => {
              const o = el('option', {value: arr[0]}, arr[1]);
              if (arr[0] === lengthHint) o.setAttribute('selected', 'selected');
              return o;
            })
          )
        )
      ),
      el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'What do you want to say?'),
        el('textarea', {class:'input',
          placeholder:'e.g. Congratulate on Series B, open a conversation about scaling their SDR team.',
          oninput: e => { intent = e.target.value; }
        }, intent)
      ),
      el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Draft'),
        el('div', {class:'ai-output'+(loading?' loading':'')}, loading ? 'Drafting…' : (output || el('span', {style:{color:'var(--text-muted)'}}, 'Click Generate to draft an email.')))
      )
    );
  }

  function renderFooter() {
    footer.innerHTML = '';
    footer.append(el('button', {class:'btn', onclick:closeModal}, 'Close'));
    if (output) {
      footer.append(el('button', {class:'btn', onclick: () => {
        navigator.clipboard.writeText(output).then(() => toast('Copied to clipboard'));
      }}, el('span', {html:icon('copy',13)}), 'Copy'));
    }
    footer.append(el('button', {class:'btn btn-accent', disabled: loading ? 'disabled' : null,
      onclick: async () => {
        if (!prospect) { toast('Select a prospect', {kind:'error', icon:'alert'}); return; }
        if (!intent.trim()) { toast('Describe your intent', {kind:'error', icon:'alert'}); return; }
        if (!llm.isConfigured()) { toast('Add an API key in Settings', {kind:'error', icon:'alert'}); return; }
        loading = true; output = ''; render(); renderFooter();
        try {
          output = await llm.draftEmail({prospect, intent, lengthHint});
          loading = false; render(); renderFooter();
        } catch (e) {
          loading = false; render(); renderFooter();
          toast('AI error: '+e.message, {kind:'error', icon:'alert', duration:5000});
        }
      }
    }, el('span', {html:icon('sparkles',13)}), output ? 'Regenerate' : 'Generate'));
  }

  render(); renderFooter();
  openModal({title: ['AI ', el('em',{},'composer')], body, footer, size:'lg'});
}

/* ═══════ 12. Prospect drawer ═══════ */
function openProspectDrawer(id) {
  const p = state.prospects.find(x => x.id === id);
  if (!p) return;
  const head = el('div', {style:{display:'flex', gap:'14px', flex:'1'}},
    el('div', {class:'avatar avatar-lg', style:{background: avatarColor(p.name)}}, initials(p.name)),
    el('div', {style:{flex:'1', minWidth:'0'}},
      el('div', {style:{fontFamily:'var(--font-display)', fontSize:'22px', fontWeight:'400', lineHeight:'1.1', letterSpacing:'-0.01em'}}, p.name),
      el('div', {style:{fontSize:'13px', color:'var(--text-3)', marginTop:'2px'}}, (p.title || '—')+' · '+p.company),
      el('div', {style:{marginTop:'8px', display:'flex', gap:'6px', flexWrap:'wrap'}},
        p.score ? el('span', {class:'score-pill '+(p.score >= 82 ? 'hot' : p.score >= 55 ? 'warm' : 'cool')}, 'Score '+p.score) : null,
        el('span', {class:'badge'}, p.source),
        ...((p.tags||[]).map(t => el('span', {class:'badge accent'}, t)))
      )
    )
  );

  const body = el('div', {});
  function renderBody() {
    body.innerHTML = '';

    // Ready-tier banner: auto-enroll suggestion for Sales Ready prospects
    const sc = computeProspectScore(p);
    const existingEnrollments = getProspectEnrollments(p.id);
    const activeEnrollments = existingEnrollments.filter(e => e.status !== 'completed');
    const dismissed = (state.dismissedReadyBanners || []).includes(p.id);
    if (sc.tier.id === 'ready' && !activeEnrollments.length && !dismissed) {
      body.append(el('div', {class:'ready-banner'},
        el('div', {class:'ready-banner-ico'}, el('span', {html:icon('zap', 16)})),
        el('div', {class:'ready-banner-main'},
          el('div', {class:'ready-banner-title'}, 'Sales Ready — score ' + sc.total),
          el('div', {class:'ready-banner-sub'}, 'This prospect crossed the ' + ((state.scoringConfig || defaultScoringConfig()).salesReadyThreshold) + '-point threshold. Enrolling in an active sequence now typically lifts reply rates 30–50% vs. waiting.')
        ),
        el('button', {class:'btn btn-accent btn-sm', onclick: () => { closeDrawer(); openSequencePickerForProspect(p.id); }},
          el('span', {html:icon('send',12)}), 'Pick sequence'),
        el('button', {class:'btn btn-sm btn-ghost', title:'Dismiss',
          onclick: () => {
            if (!state.dismissedReadyBanners) state.dismissedReadyBanners = [];
            state.dismissedReadyBanners.push(p.id);
            saveState(); renderBody();
          }
        }, el('span', {html:icon('x', 12)}))
      ));
    }

    // Current sequence enrollments
    if (activeEnrollments.length > 0) {
      const enrollBox = el('div', {class:'drawer-section'});
      enrollBox.append(el('div', {style:{fontWeight:'600', fontSize:'13px', marginBottom:'8px'}},
        el('span', {html:icon('send',13), style:{color:'var(--accent)', marginRight:'6px', display:'inline-flex', verticalAlign:'middle'}}),
        'Active in sequences'
      ));
      for (const en of activeEnrollments) {
        const seq = state.sequences.find(x => x.id === en.sequenceId);
        if (!seq) continue;
        const currentStep = seq.steps[en.stepIdx];
        const stepLabel = currentStep ? ('Step ' + (en.stepIdx + 1) + ' · ' + (currentStep.type === 'email' ? (currentStep.subject || 'Email') : currentStep.type)) : 'Completed';
        enrollBox.append(el('div', {style:{display:'flex', alignItems:'center', gap:'10px', padding:'8px 0', borderBottom:'1px solid var(--border-soft)'}},
          el('div', {style:{flex:'1', minWidth:'0', cursor:'pointer'}, onclick: () => { closeDrawer(); openSequence(seq.id); }},
            el('div', {style:{fontSize:'13px', fontWeight:'500'}}, seq.name),
            el('div', {style:{fontSize:'11.5px', color:'var(--text-3)'}}, stepLabel)
          ),
          el('span', {class:'enrollment-chip '+(en.status !== 'active' ? en.status : '')}, en.status),
          el('button', {class:'btn btn-sm btn-ghost', title:'Remove from sequence',
            onclick: () => {
              if (!confirm('Remove from "' + seq.name + '"?')) return;
              unenroll(en.id);
              seq.enrolled = Math.max(0, (seq.enrolled || 1) - 1);
              saveState(); renderBody();
              toast('Removed from ' + seq.name);
            }
          }, el('span', {html:icon('x',12)}))
        ));
      }
      body.append(enrollBox);
    }

    body.append(
      el('div', {class:'drawer-section'},
        el('div', {class:'drawer-label'}, 'Email'),
        el('div', {class:'drawer-val mono'}, p.email || '—',
          p.email ? el('span', {class:'badge '+(p.emailStatus==='verified'?'success':p.emailStatus==='risky'?'warning':p.emailStatus==='invalid'?'danger':''), style:{marginLeft:'8px'}}, p.emailStatus) : null
        ),
        el('div', {class:'drawer-label'}, 'Phone'),
        el('div', {class:'drawer-val mono'}, p.phone || '—'),
        el('div', {class:'drawer-label'}, 'LinkedIn'),
        el('div', {class:'drawer-val mono'}, p.linkedIn || '—'),
        el('div', {class:'drawer-label'}, 'Location'),
        el('div', {class:'drawer-val'}, p.location || '—'),
        el('div', {class:'drawer-label'}, 'Owner'),
        el('div', {class:'drawer-val'}, p.owner)
      ),

/* ═══════ 13. Bulk enrichment helper ═══════ */
async function runEnrichment(ids) {
  if (!llm.isConfigured()) { toast('Add an API key in Settings', {kind:'error', icon:'alert'}); return; }
  const pool = ids.map(id => state.prospects.find(p => p.id === id)).filter(Boolean);
  toast('Enriching '+pool.length+' prospect'+(pool.length>1?'s':'')+'…');
  let ok = 0, fail = 0;
  for (const p of pool) {
    try { p.aiEnrichment = await llm.enrichProspect(p); p.enrichedAt = new Date().toISOString(); ok++; }
    catch (e) { fail++; }
  }
  saveState();
  toast('Enriched '+ok+(fail?' · '+fail+' failed':''));
  renderView();
}

        )

          el('span', {}, 'Use as default sender'),
          el('span', {style:{color:'var(--text-3)', fontWeight:'400', marginLeft:'auto', fontSize:'11.5px'}}, 'Used when a sequence doesn\'t specify one')
        )
      ),
      el('div', {style:{padding:'12px 14px', background:'var(--accent-bg)', border:'1px solid var(--accent-soft)', borderRadius:'var(--radius-md)', fontSize:'12px', color:'var(--text-2)', lineHeight:'1.5'}},
        el('b', {style:{color:'var(--accent)'}}, 'Verification: '),
        'Sender identities must be verified with your provider before you can send. For SendGrid, add this address under ',
        el('span', {class:'mono'}, 'Sender Authentication → Single Sender Verification'),
        ' in the SendGrid console, then click Verify here to mark it done.'
      )
    );
  }

  footer.append(
    isEdit ? el('button', {class:'btn btn-danger',

        if (!confirm('Remove this sender? Sequences using it will fall back to the default.')) return;

        if (existing.isDefault && state.senders.length) state.senders[0].isDefault = true;
        saveState(); closeModal(); renderView();
        toast('Sender removed');

  );

  render();
  openModal({
    title: isEdit ? ['Edit ', el('em',{}, existing.displayName)] : ['New ', el('em',{}, 'sender identity')],
    body, footer,
  });
}

async function checkDomainAuth(domain, dkimSelector) {
  const fetchTxt = async (name) => {
    try {
      const r = await fetch('https://dns.google/resolve?name=' + encodeURIComponent(name) + '&type=TXT');
      if (!r.ok) return null;
      const j = await r.json();
      if (!j.Answer) return null;
      // Concatenate TXT chunks. dns.google returns data in quoted strings; strip them.
      return j.Answer.map(a => (a.data || '').replace(/^"/, '').replace(/"$/, '').replace(/"\s*"/g, '')).join(' | ');
    } catch (e) { return null; }
  };
  const selector = (dkimSelector || 's1').trim();
  const [spfRaw, dmarcRaw, dkimRaw] = await Promise.all([
    fetchTxt(domain),
    fetchTxt('_dmarc.' + domain),
    fetchTxt(selector + '._domainkey.' + domain),
  ]);

  const spf = (() => {
    if (!spfRaw) return {value:'', statusClass:'miss', statusLabel:'Missing'};
    const spfLine = spfRaw.split('|').map(s => s.trim()).find(s => /^v=spf1\b/i.test(s));
    if (!spfLine) return {value: spfRaw.slice(0,200), statusClass:'miss', statusLabel:'Missing'};
    const hasAll = /[~\-+]all\s*$/.test(spfLine);
    const isSoft = /~all\s*$/.test(spfLine);
    const mentionsSg = /include:sendgrid\.net|include:_spf\.(mailgun|postmark|resend)/i.test(spfLine);
    return {
      value: spfLine,
      statusClass: hasAll ? (isSoft ? 'warn' : 'ok') : 'warn',
      statusLabel: hasAll ? (isSoft ? '~all (soft)' : mentionsSg ? 'OK · provider' : 'OK') : 'No -all',
    };
  })();

  const dmarc = (() => {
    if (!dmarcRaw) return {value:'', statusClass:'miss', statusLabel:'Missing'};
    const line = dmarcRaw.split('|').map(s => s.trim()).find(s => /^v=DMARC1\b/i.test(s));
    if (!line) return {value: dmarcRaw.slice(0,200), statusClass:'miss', statusLabel:'Missing'};
    const policyMatch = line.match(/p=(none|quarantine|reject)/i);
    const policy = policyMatch ? policyMatch[1].toLowerCase() : 'unknown';
    return {
      value: line,
      statusClass: policy === 'reject' ? 'ok' : policy === 'quarantine' ? 'ok' : policy === 'none' ? 'warn' : 'miss',
      statusLabel: 'p=' + policy,
    };
  })();

  const dkim = (() => {
    if (!dkimRaw) return {value:'', statusClass:'miss', statusLabel:'Missing'};
    const line = dkimRaw.split('|').map(s => s.trim()).find(s => /k=|p=/.test(s));
    if (!line) return {value: dkimRaw.slice(0,200), statusClass:'warn', statusLabel:'Partial'};
    const hasKey = /p=([A-Za-z0-9+/=]+)/.test(line);
    return {
      value: line.length > 200 ? line.slice(0,200)+'…' : line,
      statusClass: hasKey ? 'ok' : 'warn',
      statusLabel: hasKey ? 'Key present' : 'No key',
    };
  })();

  return {spf, dmarc, dkim};
}

  items.push({group:'Actions', label:'Settings', icon:'filter', action: () => { closePalette(); navigate('settings'); }});
  state.prospects.slice(0, 200).forEach(p => items.push({
    group:'Prospects', label: p.name+' — '+(p.title||'-'), meta: p.company, icon:'users',
    action: () => { closePalette(); openProspectDrawer(p.id); },
  }));
  state.companies.forEach(c => items.push({
    group:'Accounts', label: c.name, meta: c.industry, icon:'building',
    action: () => { closePalette(); navigate('accounts'); },
  }));

  let q = ''; let active = 0; let visible = items;
  const inp = el('input', {placeholder:'Search prospects, accounts, actions…', autofocus:'autofocus'});
  const list = el('div', {class:'palette-list'});

  function refresh() {
    visible = !q ? items : items.filter(i => (i.label+' '+(i.meta||'')+' '+i.group).toLowerCase().includes(q.toLowerCase()));
    if (active >= visible.length) active = 0;
    list.innerHTML = '';
    let lastGroup = null;
    visible.slice(0, 40).forEach((it, i) => {
      if (it.group !== lastGroup) { list.append(el('div', {class:'palette-group-label'}, it.group)); lastGroup = it.group; }
      list.append(el('div', {class:'palette-item'+(i === active ? ' active' : ''),
        onmouseenter: () => { active = i; refresh(); },
        onclick: () => it.action(),
      },
        el('span', {style:{color:'var(--text-3)', display:'inline-flex'}, html:icon(it.icon,14)}),
        el('span', {}, it.label),
        it.meta ? el('span', {class:'palette-item-meta'}, it.meta) : null
      ));
    });
    if (!visible.length) list.append(el('div', {class:'empty', style:{padding:'28px'}}, 'No matches'));
  }

  inp.addEventListener('input', e => { q = e.target.value; active = 0; refresh(); });
  inp.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(visible.length - 1, active + 1); refresh(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(0, active - 1); refresh(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (visible[active]) visible[active].action(); }
    else if (e.key === 'Escape') closePalette();
  });

  const pal = el('div', {class:'palette-backdrop',
    onclick: e => { if (e.target.classList.contains('palette-backdrop')) closePalette(); }
  },
    el('div', {class:'palette'},
      el('div', {class:'palette-input-wrap'},
        el('span', {style:{color:'var(--text-3)', display:'inline-flex'}, html:icon('search',14)}),
        inp,
        el('span', {class:'kbd'}, 'esc')
      ),
      list
    )
  );
  $('#palette-root').append(pal);
  refresh();
  setTimeout(() => inp.focus(), 0);
}
function closePalette() { $('#palette-root').innerHTML = ''; }

/* ═══════ 16. Init ═══════ */
$('#nav-settings').addEventListener('click', () => navigate('settings'));
$('#btn-ai-composer').addEventListener('click', () => openAIComposer());
$('#btn-new').addEventListener('click', () => {
  if (state.currentView === 'prospects') openImportModal();
  else if (state.currentView === 'pipeline') toast('New deal form coming next iteration');
  else openImportModal();
});
$('#global-search').addEventListener('click', openPalette);
$('#global-search').addEventListener('focus', openPalette);

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    openPalette();
  }
});

renderSidebar();
renderBreadcrumb();
renderView();
console.log('USIP ready · state:', state);
</script>
