function computeProspectScore(p, cfg) {
  cfg = cfg || state.scoringConfig || defaultScoringConfig();

  // ── Firmographic ──
  let firmo = 0;
  const t = (p.title || '').toLowerCase();
  if (/\b(ceo|cfo|coo|cto|cmo|cro|president|founder|chief)\b/.test(t))      firmo += cfg.firmographic.seniority.cLevel;
  else if (/\b(vp|vice president|svp|evp)\b/.test(t))                       firmo += cfg.firmographic.seniority.vp;
  else if (/\b(director|head of)\b/.test(t))                                firmo += cfg.firmographic.seniority.director;
  else if (/\b(manager|lead)\b/.test(t))                                    firmo += cfg.firmographic.seniority.manager;
  else                                                                      firmo += cfg.firmographic.seniority.ic;

  const company = state.companies.find(c => c.name === p.company);
  const size = company ? (company.size || '') : '';
  if (/1000|5000|10000/.test(size) || /\b(1,000|10,000)\+/.test(size))     firmo += cfg.firmographic.companySize.enterprise;
  else if (/500/.test(size))                                                firmo += cfg.firmographic.companySize.midmarket;
  else if (/50/.test(size))                                                 firmo += cfg.firmographic.companySize.smb;
  else                                                                      firmo += cfg.firmographic.companySize.startup;

  if (p.email && p.emailStatus === 'verified') firmo += cfg.firmographic.dataCompleteness.emailVerified;
  if (p.phone)                                 firmo += cfg.firmographic.dataCompleteness.phonePresent;
  if (p.linkedIn)                              firmo += cfg.firmographic.dataCompleteness.linkedinPresent;
  if (p.title)                                 firmo += cfg.firmographic.dataCompleteness.titlePresent;
  firmo = Math.max(0, Math.min(cfg.firmographic.maxPoints, firmo));

  // ── Behavioral ──
  let behav = 0;
  const sigs = state.signals.filter(s => s.personId === p.id);
  const opens = Math.min(cfg.behavioral.emailOpenCap, sigs.filter(s => s.type === 'open').length);
  behav += opens * cfg.behavioral.emailOpen;
  const clicks = Math.min(cfg.behavioral.linkClickCap, sigs.filter(s => s.type === 'click').length);
  behav += clicks * cfg.behavioral.linkClick;
  if (sigs.find(s => s.type === 'reply')) behav += cfg.behavioral.reply;
  behav += Math.min(10, (p.completedSteps || 0)) * cfg.behavioral.completedStep;
  if (p.hardBounce)  behav += cfg.behavioral.hardBounce;
  if (p.unsubscribed) behav += cfg.behavioral.unsubscribe;

  // Decay by inactivity
  const lastActivity = p.lastTouch ? new Date(p.lastTouch) : (sigs.length ? new Date(sigs[0].time) : null);
  if (lastActivity) {
    const monthsIdle = Math.max(0, (Date.now() - lastActivity.getTime()) / (30 * 86400000));
    if (monthsIdle > 1) behav = behav * Math.pow(1 - cfg.behavioral.decayPerMonth, monthsIdle - 1);
  }
  behav = Math.max(0, Math.min(cfg.behavioral.maxPoints, Math.round(behav)));

  // ── AI Fit ──
  // Prefer stored AI score; otherwise derive from existing `score` field (legacy) scaled to 30
  let aiFit = 0;
  if (typeof p.aiFitScore === 'number') {
    aiFit = Math.round(p.aiFitScore / 100 * cfg.aiFit.maxPoints);
  } else if (typeof p.score === 'number') {
    // Legacy score in 0-100 range — normalize
    aiFit = Math.round(Math.min(100, p.score) / 100 * cfg.aiFit.maxPoints);
  }
  aiFit = Math.max(0, Math.min(cfg.aiFit.maxPoints, aiFit));

  const total = Math.max(0, Math.min(100, firmo + behav + aiFit));
  const tier = cfg.tiers.find(t => total >= t.min && total <= t.max) || cfg.tiers[0];

  return {firmo, behav, aiFit, total, tier};
}

function tierForScore(score, cfg) {
  cfg = cfg || state.scoringConfig || defaultScoringConfig();
  return cfg.tiers.find(t => score >= t.min && score <= t.max) || cfg.tiers[0];
}

function seedConversations(prospects, signals) {
  // Pick top-scoring or recently-engaged prospects across a mix of channels
  const candidates = [...prospects].sort((a,b) => (b.score||0) - (a.score||0)).slice(0, 22);
  const channels = ['email','linkedin','whatsapp','telegram'];
  const templates = {
    email: [
      {them:"Got your note — ran it by the team and we're interested in learning more. Can you share pricing and implementation timeline?", me:"Happy to. Pricing scales with seat count and I can have a tailored quote to you by EOD. Want to hold 25 min Thursday to walk through implementation?"},
      {them:"This looks relevant. What's the typical deployment time for an organization our size?", me:"For a team of your size, most rollouts take 4–6 weeks with a phased approach. I can send you two case studies from comparable orgs if helpful."},
      {them:"Thanks for sending that over. Forwarding to our CFO for review.", me:"Appreciate it. Happy to jump on a short call with your CFO to walk through ROI model whenever works."},
      {them:"We're evaluating two other vendors. What makes you different?", me:"Fair question. The short version: faster deployment and no per-seat pricing cliff. I can put together a direct comparison if that helps your eval."},
    ],
    linkedin: [
      {them:"Saw your post on outbound benchmarks — really resonated. Would love to chat about how you're thinking about signal-based prospecting.", me:"Thanks! Happy to. Send a calendar invite or I can grab 20 min this week."},
      {them:"Hey, noticed we both follow Nexuscale. Are you using their platform?", me:"We evaluated it — ended up building internally for flexibility. Happy to compare notes."},
      {them:"Congrats on the new role! Let me know if you're exploring tooling in this space.", me:"Thanks — timing's actually good. We're re-evaluating our stack this quarter. Got 15 min next week?"},
    ],
    whatsapp: [
      {them:"Hey Idris — quick one. Can we push the Thursday call by 30 min? Got a board meeting running long.", me:"No problem. 3:00 instead of 2:30?"},
      {them:"Contract's in legal review. Should have redlines by Friday.", me:"👍 appreciate the heads up. Let me know if anything needs CRO sign-off on our end."},
    ],
    telegram: [
      {them:"Idris — the platform demo blew the team away. Sending budget approval request up today.", me:"That's great to hear. Let me know if you need anything from us to support the approval."},
      {them:"Following up on our intro last week — we're ready to start a pilot.", me:"Excellent. I'll send a short pilot scope doc this afternoon with success metrics and timeline."},
    ],
  };
  const convs = [];
  for (let i = 0; i < candidates.length; i++) {
    const p = candidates[i];
    const channel = channels[i % channels.length];
    const pool = templates[channel];
    const t = pool[i % pool.length];
    const firstName = p.name.split(' ')[0];
    const hoursAgo = i < 4 ? randInt(0, 2) : i < 10 ? randInt(3, 20) : i < 16 ? randInt(24, 72) : randInt(72, 240);
    const unread = i < 3;  // top 3 unread
    const msgs = [];
    // First message from them
    msgs.push({from:'them', body: t.them.replace(/Idris/g, firstName).replace(/\bthem\b/g,'you'), at: new Date(Date.now() - hoursAgo * 3600000 - 3 * 3600000).toISOString()});
    // Reply from us (unless unread)
    if (!unread) {
      msgs.push({from:'me', body: t.me, at: new Date(Date.now() - hoursAgo * 3600000 - 2 * 3600000).toISOString()});
      // Optional third message
      if (i % 3 === 0 && pool.length > 1) {
        const t2 = pool[(i+1) % pool.length];
        msgs.push({from:'them', body: t2.them.replace(/Idris/g, firstName).slice(0, 140), at: new Date(Date.now() - hoursAgo * 3600000).toISOString()});
      }
    }
    const lastMsg = msgs[msgs.length - 1];
    convs.push({
      id: uuid(),
      contactId: p.id,
      channel,
      messages: msgs,
      lastAt: lastMsg.at,
      snippet: lastMsg.body.slice(0, 120),
      unread,
      lastFrom: lastMsg.from,
    });
  }
  // Sort by lastAt descending
  convs.sort((a,b) => new Date(b.lastAt) - new Date(a.lastAt));
  return convs;
}

/* ═══════ 6. CSV parser + import ═══════
   RFC-4180-compliant-ish: handles quoted fields, embedded commas,
   escaped quotes (""), CRLF/LF, and UTF-8 BOM. */
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = []; let row = []; let field = ''; let inQ = false; let i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(field); field = ''; i++; continue; }
    if (c === '\n' || c === '\r') {
      row.push(field); field = '';
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = [];
      if (c === '\r' && text[i+1] === '\n') i += 2; else i++;
      continue;
    }
    field += c; i++;
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  if (!rows.length) return {headers:[], rows:[]};
  return {headers: rows[0].map(h => h.trim()), rows: rows.slice(1).filter(r => r.some(c => c && c.trim()))};
}

const FIELD_DEFS = [
  {key:'firstName', label:'First name',   patterns:[/^first[\s_-]?name$/i,/^fname$/i,/^given[\s_-]?name$/i,/^first$/i]},
  {key:'lastName',  label:'Last name',    patterns:[/^last[\s_-]?name$/i,/^lname$/i,/^surname$/i,/^last$/i]},
  {key:'name',      label:'Full name',    patterns:[/^(full[\s_-]?)?name$/i,/^contact[\s_-]?name$/i]},
  {key:'email',     label:'Email',        patterns:[/^e[\s_-]?mail.*$/i,/^email[\s_-]?address$/i,/^work[\s_-]?email$/i]},
  {key:'title',     label:'Title',        patterns:[/^(job[\s_-]?)?title$/i,/^position$/i,/^role$/i]},
  {key:'company',   label:'Company',      patterns:[/^company([\s_-]?name)?$/i,/^employer$/i,/^organi[sz]ation$/i,/^account$/i]},
  {key:'phone',     label:'Phone',        patterns:[/^phone.*$/i,/^mobile.*$/i,/^tel(ephone)?$/i]},
  {key:'linkedIn',  label:'LinkedIn URL', patterns:[/^linked[\s_-]?in.*$/i,/^li[\s_-]?url$/i]},
  {key:'location',  label:'Location',     patterns:[/^(location|city|country|address)$/i]},
  {key:'industry',  label:'Industry',     patterns:[/^industry$/i,/^sector$/i,/^vertical$/i]},
  {key:'tags',      label:'Tags',         patterns:[/^tags?$/i,/^labels?$/i,/^categor(y|ies)$/i]},
];

function autoMapColumns(headers, sampleRows) {
  const map = {};
  FIELD_DEFS.forEach(f => map[f.key] = null);
  headers.forEach((h, idx) => {
    for (const def of FIELD_DEFS) {
      if (map[def.key] != null) continue;
      if (def.patterns.some(p => p.test(h.trim()))) { map[def.key] = idx; break; }
    }
  });
  if (map.email == null && sampleRows.length) {
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    for (let i=0; i<headers.length; i++) {
      const col = sampleRows.map(r => (r[i]||'').trim()).filter(Boolean);
      if (col.length >= 2 && col.every(v => emailRe.test(v))) { map.email = i; break; }
    }
  }
  return map;
}

function buildProspectFromRow(row, map, existingCompaniesByName) {
  const v = idx => idx == null ? '' : (row[idx] || '').trim();
  let first = v(map.firstName), last = v(map.lastName);
  let name = v(map.name);
  if (!name && (first || last)) name = (first + ' ' + last).trim();
  if (name && (!first || !last)) {
    const parts = name.split(/\s+/);
    if (!first) first = parts[0] || '';
    if (!last) last = parts.slice(1).join(' ') || '';
  }
  const email = v(map.email).toLowerCase();
  const companyName = v(map.company);
  const tagsRaw = v(map.tags);
  const tags = tagsRaw ? tagsRaw.split(/[,;|]/).map(t=>t.trim()).filter(Boolean) : [];
  if (!name && !email) return null;
  let companyId = null, matched = null;
  if (companyName) {
    const k = companyName.toLowerCase();
    if (existingCompaniesByName.has(k)) { matched = existingCompaniesByName.get(k); companyId = matched.id; }
  }
  return {
    id: uuid(), firstName: first, lastName: last, name: name || email,
    title: v(map.title), company: companyName, companyId,
    email, emailStatus: email ? 'unverified' : 'missing',
    phone: v(map.phone), linkedIn: v(map.linkedIn), location: v(map.location),
    score: 0, stage: 'Lead', source: 'CSV import',
    owner: 'Idris Grant',
    tags: tags.length ? tags : ['CSV import'],
    lastTouch: null, lastTouchChannel: null,
    added: new Date().toISOString(),
    enrichedAt: null, aiEnrichment: null,
    _industry: v(map.industry),
  };
}

function runImport(parsedCSV, map) {
  const {rows} = parsedCSV;
  const existingCompaniesByName = new Map(state.companies.map(c => [c.name.toLowerCase(), c]));
  const existingEmails = new Set(state.prospects.map(p => (p.email||'').toLowerCase()).filter(Boolean));
  const seenEmails = new Set();
  const created = [], dupes = [], skipped = [];
  const newCompanies = new Map();
  for (const row of rows) {
    const p = buildProspectFromRow(row, map, existingCompaniesByName);
    if (!p) { skipped.push(row); continue; }
    if (p.email) {
      if (existingEmails.has(p.email) || seenEmails.has(p.email)) { dupes.push(p); continue; }
      seenEmails.add(p.email);
    }
    if (p.company && !p.companyId) {
      const k = p.company.toLowerCase();
      if (newCompanies.has(k)) p.companyId = newCompanies.get(k).id;
      else {
        const company = {
          id: uuid(), name: p.company,
          industry: p._industry || 'Unknown', size: '—',
          domain: p.email ? p.email.split('@')[1] : '',
          color: avatarColor(p.company),
          revenue: '—', location: p.location || '—',
          founded: null, healthScore: 50, owner: p.owner,
        };
        newCompanies.set(k, company);
        existingCompaniesByName.set(k, company);
        p.companyId = company.id;
      }
    }
    delete p._industry;
    created.push(p);
  }
  for (const c of newCompanies.values()) state.companies.push(c);
  for (const p of created) state.prospects.push(p);
  saveState();
  return {created: created.length, dupes: dupes.length, skipped: skipped.length, newCompanies: newCompanies.size};
}

function buildPriorityQueue() {
  const items = [];
  // 1. Most recent positive reply — overdue
  const reply = state.signals.filter(s => s.type === 'reply').sort((a,b)=>new Date(a.time)-new Date(b.time))[0];
  if (reply) {
    const prospect = state.prospects.find(p => p.id === reply.personId);
    const hrs = Math.floor((Date.now() - new Date(reply.time))/3600000);
    items.push({
      kind: 'overdue',
      tag: 'Overdue',
      title: 'Reply to ' + reply.person,
      meta: reply.company,
      subtitle: hrs > 24 ? ('She asked about implementation timeline ' + Math.floor(hrs/24) + ' days ago') : 'New reply needs a response',
      draft: '"Hi ' + reply.person.split(' ')[0] + ' — thanks for the context. Based on similar rollouts, we\'ve typically seen implementation take 4-6 weeks with a phased approach..."',
      actions: [
        {label:'Send draft', primary: true, onClick: () => prospect && openAIComposer({prospect, intent:'Reply to positive response about ' + reply.body})},
        {label:'Regenerate', onClick: () => prospect && openAIComposer({prospect, intent:'Draft a thoughtful reply'})},
        {label:'Edit', onClick: () => prospect && openAIComposer({prospect, intent:'Thoughtful reply to the prospect'})},
      ],
    });
  }
  // 2. Stalled deal or dormant hot prospect → follow-up
  const stalled = state.deals.filter(d => d.stage !== 'won' && d.daysInStage > 14).sort((a,b)=>b.daysInStage-a.daysInStage)[0];
  if (stalled) {
    const prospect = state.prospects.find(p => p.id === stalled.championId);
    items.push({
      kind: 'followup',
      tag: 'Follow-up',
      title: 'Third touch · ' + (prospect ? prospect.name : stalled.company),
      meta: stalled.company,
      subtitle: stalled.aiNote,
      actions: [
        {label:'Send draft', primary: true, onClick: () => prospect && openAIComposer({prospect, intent:'Re-engage stalled deal: ' + stalled.aiNote})},
        {label:'Snooze', onClick: () => toast('Snoozed for 3 days')},
      ],
    });
  }
  // 3. LinkedIn engagement batch
  const linkedinSigs = state.signals.filter(s => s.type === 'linkedin' && (Date.now()-new Date(s.time))/86400000 < 2).length;
  if (linkedinSigs > 0) {
    items.push({
      kind: 'linkedin',
      tag: 'LinkedIn',
      title: 'Engage · ' + linkedinSigs + ' prospect posts',
      meta: 'Hot prospects posted recently',
      subtitle: 'Est. 15 min · boosts reply rate when followed by DM within 24h',
      actions: [
        {label:'Open feed', primary: true, onClick: () => navigate('intelligence')},
        {label:'Skip', onClick: () => toast('Skipped for today')},
      ],
    });
  }
  return items.slice(0, 3);
}

/* ── Pipeline (Kanban with drag-drop, KPI strip, stalled warnings) ── */
function renderPipeline(root) {
  const open = state.deals.filter(d => d.stage !== 'won');
  const weighted = open.reduce((s,d) => s + d.value * (d.winProb/100), 0);
  const openTotal = open.reduce((s,d) => s + d.value, 0);
  const stalled = open.filter(d => d.daysInStage > 30);
  const atRisk = stalled.reduce((s,d) => s + d.value, 0);
  const quota = 4200000;
  const won = state.deals.filter(d => d.stage === 'won').reduce((s,d) => s + d.value, 0);
  const attainment = Math.min(100, Math.round((won / quota) * 100));
  const myDeals = open.filter(d => d.owner === 'Idris Grant').length;
  const myWeighted = open.filter(d => d.owner === 'Idris Grant').reduce((s,d) => s + d.value * (d.winProb/100), 0);

  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Pipeline · ', el('em',{}, 'Q2 2026')),
      el('div', {class:'page-subtitle'}, 'Idris Grant · ' + myDeals + ' open · ' + fmtMoney(myWeighted) + ' weighted')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn'}, 'My deals'),
      el('button', {class:'btn'}, 'Team'),
      el('button', {class:'btn'}, el('span',{html:icon('filter',14)}), 'Filter'),
      el('button', {class:'btn btn-primary'}, el('span',{html:icon('plus',14)}), 'New deal')
    )
  ));

  // KPI strip
  root.append(el('div', {class:'pipe-kpi-strip'},
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Open pipeline'),
      el('div', {class:'pipe-kpi-value'}, fmtMoney(openTotal)),
      el('div', {class:'pipe-kpi-sub'}, open.length + ' opportunities')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Weighted forecast'),
      el('div', {class:'pipe-kpi-value'}, fmtMoney(weighted)),
      el('div', {class:'pipe-kpi-sub'}, 'prob-weighted AI estimate')
    ),
    el('div', {class:'pipe-kpi k-quota'},
      el('div', {class:'pipe-kpi-label'}, 'Quota attainment'),
      el('div', {class:'pipe-kpi-value'}, attainment + '%'),
      el('div', {class:'quota-bar'}, el('div', {class:'quota-bar-fill', style:{width: attainment + '%'}})),
      el('div', {class:'pipe-kpi-sub'}, fmtMoney(won) + ' closed of ' + fmtMoney(quota))
    ),
    el('div', {class:'pipe-kpi k-risk'},
      el('div', {class:'pipe-kpi-label'}, 'At risk'),
      el('div', {class:'pipe-kpi-value'}, fmtMoney(atRisk)),
      el('div', {class:'pipe-kpi-sub'}, stalled.length + ' stalled deals')
    )
  ));

  const kb = el('div', {class:'kanban'});
  for (const s of STAGES) {
    const dealsIn = state.deals.filter(d => d.stage === s.id);
    const total = dealsIn.reduce((sum,d)=>sum+d.value, 0);
    const col = el('div', {
      class:'k-col', 'data-stage': s.id,
      ondragover: e => { e.preventDefault(); col.classList.add('drag-over'); },
      ondragleave: () => col.classList.remove('drag-over'),
      ondrop: e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        const dealId = e.dataTransfer.getData('text/deal-id');
        if (!dealId) return;
        const deal = state.deals.find(d => d.id === dealId);
        if (deal && deal.stage !== s.id) {
          deal.stage = s.id; deal.daysInStage = 0;
          saveState(); renderView();
          toast('Moved to '+s.name);
        }
      },
    });
    col.append(
      el('div', {class:'k-col-head'},
        el('div', {class:'k-col-dot', style:{background: s.color}}),
        el('div', {class:'k-col-name'}, s.name),
        el('div', {class:'k-col-count'}, String(dealsIn.length)),
        el('div', {class:'k-col-value'}, fmtMoney(total))
      )
    );
    const body = el('div', {class:'k-col-body'});
    for (const d of dealsIn) body.append(renderDealCard(d));
    col.append(body);
    kb.append(col);
  }
  root.append(kb);
}

function renderDealCard(d) {
  const stallCls = d.stage === 'won' ? 'k-won'
    : d.daysInStage > 30 ? 'k-stalled'
    : d.daysInStage > 14 ? 'k-warn' : '';
  const card = el('div', {
    class:'k-card ' + stallCls, draggable:'true',
    ondragstart: e => { e.dataTransfer.setData('text/deal-id', d.id); card.classList.add('dragging'); e.stopPropagation(); },
    ondragend: () => card.classList.remove('dragging'),
    onclick: () => openOpportunityDetail(d.id),
  });
  card.append(
    el('div', {class:'k-card-company'}, d.company),
    el('div', {class:'k-card-title'}, d.name.split('—')[1] ? d.name.split('—')[1].trim() : d.name),
    el('div', {class:'k-card-row'},
      el('div', {class:'k-card-value'}, fmtMoney(d.value)),
      el('div', {class:'k-card-meta'},
        el('span', {class:'k-card-ai'}, el('span',{html:icon('sparkles',10)}), d.winProb+'%'),
        el('span', {}, d.daysInStage+'d')
      )
    ),
    d.daysInStage > 30 && d.stage !== 'won' ? el('div', {class:'k-card-stall-tag'},
      el('span', {html:icon('alert',10)}), d.daysInStage + 'd stalled'
    ) : null
  );
  return card;
}

}

function openSequenceWizard() {

    id: uuid(),
    name: 'New sequence',

/* ── Enroll prospects modal (Path B) ── */
function openEnrollModal(sequenceId, preselectIds = []) {
  const seq = state.sequences.find(s => s.id === sequenceId);
  if (!seq) return;

  const state_ = {
    selected: new Set(preselectIds),
    filter: 'all', // all | ready | hot | warm | cold
    search: '',
  };

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%', alignItems:'center'}});

  function render() {
    body.innerHTML = '';
    const prospects = state.prospects.map(p => ({p, s: computeProspectScore(p)}));

    // Apply tier filter
    let shown = prospects;
    if (state_.filter === 'ready') shown = shown.filter(x => x.s.tier.id === 'ready');
    else if (state_.filter === 'hot')  shown = shown.filter(x => x.s.tier.id === 'hot');
    else if (state_.filter === 'warm') shown = shown.filter(x => x.s.tier.id === 'warm');
    else if (state_.filter === 'cold') shown = shown.filter(x => x.s.tier.id === 'cold');

    // Apply search
    if (state_.search) {
      const q = state_.search.toLowerCase();
      shown = shown.filter(({p}) => (p.name+' '+p.email+' '+p.title+' '+p.company).toLowerCase().includes(q));
    }

    // Sort by score desc
    shown.sort((a, b) => b.s.total - a.s.total);
    shown = shown.slice(0, 150);

    const alreadyEnrolled = shown.filter(({p}) => isEnrolled(p.id, sequenceId)).length;

    body.append(
      el('div', {class:'enroll-bar'},
        el('span', {html:icon('filter', 13), style:{color:'var(--text-3)', display:'inline-flex'}}),
        ...['all','ready','hot','warm','cold'].map(f => el('button', {
          class:'btn btn-sm'+(state_.filter === f ? ' btn-primary' : ''),
          onclick: () => { state_.filter = f; render(); },
        }, f.charAt(0).toUpperCase() + f.slice(1)))
      ),
      el('div', {class:'form-row', style:{marginBottom:'10px'}},
        el('input', {class:'input', type:'text', placeholder:'Search name, company, email, title…',
          value: state_.search,
          oninput: e => { state_.search = e.target.value; render(); }})
      ),
      el('div', {class:'enroll-summary'},
        'Showing ', el('b', {}, String(shown.length)), ' prospect', shown.length === 1 ? '' : 's',
        alreadyEnrolled ? ' · ' + alreadyEnrolled + ' already enrolled' : '',
        ' · ', el('b', {}, String(state_.selected.size)), ' selected',
        shown.length > 0 ? el('button', {class:'btn btn-sm btn-ghost', style:{marginLeft:'10px'},
          onclick: () => {
            const visibleIds = shown.filter(({p}) => !isEnrolled(p.id, sequenceId)).map(({p}) => p.id);
            const allSelected = visibleIds.every(id => state_.selected.has(id));
            if (allSelected) visibleIds.forEach(id => state_.selected.delete(id));
            else visibleIds.forEach(id => state_.selected.add(id));
            render();
          }}, visibleIds(shown, sequenceId).every(id => state_.selected.has(id)) ? 'Deselect visible' : 'Select all visible') : null
      )
    );

    const list = el('div', {class:'enroll-pick-list'});
    if (!shown.length) {
      list.append(el('div', {class:'empty', style:{padding:'30px'}}, 'No prospects match these filters.'));
    } else {
      for (const {p, s} of shown) {
        const enrolled = isEnrolled(p.id, sequenceId);
        const selected = state_.selected.has(p.id);
        list.append(el('div', {
          class:'enroll-row'+(selected?' selected':'')+(enrolled?' enrolled':''),
          onclick: () => {
            if (enrolled) return; // can't select — already in
            if (selected) state_.selected.delete(p.id);
            else state_.selected.add(p.id);
            render();
          },
        },
          el('div', {class:'enroll-cb'},
            enrolled ? el('span', {html:icon('check',10)}) :
            selected ? el('span', {html:icon('check',10)}) : null
          ),
          el('div', {class:'avatar avatar-sm', style:{background: avatarColor(p.name)}}, initials(p.name)),
          el('div', {class:'enroll-main'},
            el('div', {class:'enroll-name'},
              p.name,
              el('span', {class:'tier-badge '+s.tier.cls, style:{fontSize:'9.5px'}}, s.tier.label),
              el('span', {style:{fontFamily:'var(--font-display)', fontSize:'13px', fontVariantNumeric:'tabular-nums', color:'var(--text-3)'}}, String(s.total))
            ),
            el('div', {class:'enroll-meta'}, (p.title || '—') + ' · ' + p.company + (enrolled ? ' · already in this sequence' : ''))
          )
        ));
      }
    }
    body.append(list);
  }

  function visibleIds(shown, seqId) {
    return shown.filter(({p}) => !isEnrolled(p.id, seqId)).map(({p}) => p.id);
  }

  footer.append(
    el('button', {class:'btn', onclick: closeModal}, 'Cancel'),
    el('div', {style:{flex:'1'}}),
    el('button', {class:'btn btn-primary', onclick: () => {
      if (state_.selected.size === 0) { toast('Select at least one prospect', {kind:'error', icon:'alert'}); return; }
      const added = enrollProspects(sequenceId, [...state_.selected]);
      closeModal();
      renderView();
      toast(added + ' prospect' + (added === 1 ? '' : 's') + ' enrolled in ' + seq.name);
    }}, el('span', {html:icon('send',13)}), 'Enroll selected')
  );

  render();
  openModal({
    title: ['Enroll in ', el('em', {}, seq.name)],
    body, footer, size:'lg',
  });
}

/* ── Sequence picker for a single prospect (Path B) ── */
function openSequencePickerForProspect(prospectId) {

  if (!p) return;

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%'}},
    el('button', {class:'btn', onclick: closeModal}, 'Cancel'),
    el('div', {style:{flex:'1'}}),
    el('button', {class:'btn btn-primary', onclick: () => { closeModal(); openSequenceWizard(); }},
      el('span', {html:icon('plus',13)}), 'New sequence')
  );

  const activeSeqs = state.sequences.filter(s => s.status === 'active' || s.status === 'draft');

  if (!activeSeqs.length) {
    body.append(el('div', {class:'empty', style:{padding:'24px 16px'}},
      el('div', {style:{fontSize:'14px', color:'var(--text-2)', marginBottom:'6px'}}, 'No sequences yet'),
      el('div', {style:{fontSize:'12px', color:'var(--text-3)'}}, 'Create a sequence first, then enroll prospects into it.')
    ));
  } else {
    const currentEnrollments = getProspectEnrollments(prospectId).map(e => e.sequenceId);
    body.append(el('div', {style:{fontSize:'12.5px', color:'var(--text-3)', marginBottom:'10px', lineHeight:'1.5'}},

    ));

    const list = el('div', {class:'enroll-pick-list'});
    for (const s of activeSeqs) {
      const already = currentEnrollments.includes(s.id);
      const sender = s.senderId ? state.senders.find(x => x.id === s.senderId) : (state.senders.find(x => x.isDefault) || state.senders[0]);
      const stepCount = (s.steps && s.steps.length) || 0;
      const replyPct = s.enrolled ? ((s.replied || 0) / s.enrolled * 100).toFixed(1) : '0.0';
      list.append(el('div', {
        class:'enroll-row'+(already?' enrolled':''),
        onclick: already ? null : () => {
          const added = enrollProspects(s.id, [prospectId]);
          closeModal();
          renderView();
          toast(added ? (p.name + ' enrolled in ' + s.name) : 'Already enrolled');
        },
      },
        el('div', {class:'enroll-cb'}, already ? el('span', {html:icon('check',10)}) : null),
        el('div', {class:'avatar avatar-sm', style:{background: avatarColor(s.name), borderRadius:'8px'}}, el('span',{html:icon('send',12)})),
        el('div', {class:'enroll-main'},
          el('div', {class:'enroll-name'},
            s.name,
            el('span', {class:'badge '+(s.status==='active'?'success':''), style:{fontSize:'10px'}}, s.status)
          ),
          el('div', {class:'enroll-meta'},
            stepCount + ' steps · via ' + (sender ? sender.displayName : '—') +
            ' · ' + (s.enrolled || 0) + ' enrolled · ' + replyPct + '% reply' +
            (already ? ' · already enrolled here' : '')
          )
        )
      ));
    }
    body.append(list);
  }

  openModal({
    title: ['Add ', el('em', {}, p.name), ' to a sequence'],
    body, footer,
  });
}

  if (!seq) {
    root.append(el('div', {class:'empty'}, 'Sequence not found.'));
    return;
  }
  const defaultSender = state.senders.find(x => x.isDefault) || state.senders[0] || null;
  const currentSender = seq.senderId ? state.senders.find(x => x.id === seq.senderId) : defaultSender;

  // Header

    el('div', {style:{display:'flex', alignItems:'center', gap:'12px', flex:'1'}},

      ),
      el('div', {class:'form-row', style:{marginBottom:'0'}},
        el('label', {class:'form-label'}, 'Send from'),
        buildSelect(seq.senderId || '', ['', ...state.senders.map(s => s.id)],
          v => v === '' ? 'Default · ' + (defaultSender ? defaultSender.displayName : 'none') : (state.senders.find(s => s.id === v) || {displayName:'—'}).displayName,
          v => { seq.senderId = v || null; saveState(); renderView(); })
      )
    )
  ));
  head.append(el('div', {class:'seq-head-stats'},

  ));

    for (const en of enrollments) {

      const currentStep = seq.steps[en.stepIdx];

        el('div', {class:'signal-header'},
          el('div', {class:'avatar avatar-sm', style:{background: avatarColor(p.name)}}, initials(p.name)),
          el('span', {class:'signal-person'}, p.name),
          el('span', {style:{fontSize:'12px', color:'var(--text-3)'}}, p.title + ' · ' + p.company),
          el('div', {style:{marginLeft:'auto', display:'flex', alignItems:'center', gap:'10px'}},
            el('span', {class:'enrollment-chip '+(en.status !== 'active' ? en.status : '')}, en.status),
            el('span', {style:{fontSize:'11.5px', color:'var(--text-3)'}}, stepLabel),
            el('button', {class:'btn btn-sm', title:'Remove from sequence',
              onclick: e => {
                e.stopPropagation();
                if (!confirm('Remove ' + p.name + ' from this sequence?')) return;
                unenroll(en.id);
                seq.enrolled = Math.max(0, (seq.enrolled || 1) - 1);
                saveState(); renderView();
                toast(p.name + ' removed from sequence');
              }
            }, el('span', {html:icon('x', 12)}))
          )
        )
      ));
    }
    enrollCard.append(eBody);
    root.append(enrollCard);
  } else {
    root.append(el('div', {class:'card', style:{marginTop:'16px', padding:'24px', textAlign:'center'}},
      el('div', {style:{fontSize:'14px', color:'var(--text-2)', marginBottom:'6px'}}, 'No prospects enrolled yet'),
      el('div', {style:{fontSize:'12.5px', color:'var(--text-3)', marginBottom:'12px'}}, 'Pick prospects to enroll and the sequence will start sending based on the step flow.'),
      el('button', {class:'btn btn-primary', onclick: () => openEnrollModal(seq.id)},
        el('span', {html:icon('plus',13)}), 'Enroll prospects')
    ));
  }
}

function renderSequenceStep(seq, step, idx) {
  const typeMeta = {
    email:    {label:'Email',          ico:'mail',     clsNum:'step-type-email'},
    wait:     {label:'Wait',           ico:'calendar', clsNum:'step-type-wait'},
    linkedin: {label:'LinkedIn',       ico:'linkedin', clsNum:'step-type-linkedin'},
    task:     {label:'Manual task',    ico:'check',    clsNum:'step-type-task'},
    condition:{label:'Condition',      ico:'filter',   clsNum:'step-type-condition'},
  };
  const m = typeMeta[step.type] || typeMeta.email;

  let title, meta;
  if (step.type === 'email') {
    title = step.subject || '(no subject)';
    const s = step.sent || 0, o = step.opened || 0, r = step.replied || 0;
    meta = el('div', {class:'step-stats-inline'},
      el('span', {}, 'Sent: ', el('b', {}, String(s))),
      el('span', {}, 'Opened: ', el('b', {}, s ? Math.round(o/s*100) + '%' : '—')),
      el('span', {}, 'Replied: ', el('b', {}, s ? Math.round(r/s*100) + '%' : '—'))
    );
  } else if (step.type === 'wait') {
    title = 'Wait ' + (step.days || 1) + ' day' + ((step.days || 1) === 1 ? '' : 's');
    meta = el('div', {class:'step-meta'}, 'No action — pause between touches');
  } else if (step.type === 'linkedin') {
    title = 'LinkedIn · ' + (step.action || 'connect').replace('-', ' ');
    meta = el('div', {class:'step-meta'}, step.note || '—');
  } else if (step.type === 'task') {
    title = step.title || 'Manual task';
    meta = el('div', {class:'step-meta'}, 'Creates a task for the sequence owner');
  } else if (step.type === 'condition') {
    title = 'If: ' + (step.test || 'no-reply');
    meta = el('div', {class:'step-meta'}, step.note || 'Branches based on engagement');
  }

  return el('div', {
    class:'step-card',
    onclick: () => openStepEditor(seq, step, idx),
  },
    el('div', {class:'step-num ' + m.clsNum}, String(idx + 1)),
    el('div', {class:'step-body'},
      el('div', {class:'step-title'}, m.label, ' · ', title),
      meta
    ),
    el('div', {class:'step-actions'},
      el('button', {class:'btn btn-sm', title:'Edit', onclick: e => { e.stopPropagation(); openStepEditor(seq, step, idx); }},
        el('span', {html:icon('edit',12)})
      ),
      el('button', {class:'btn btn-sm', title:'Move up', onclick: e => {
        e.stopPropagation();
        if (idx === 0) return;
        const tmp = seq.steps[idx - 1];
        seq.steps[idx - 1] = seq.steps[idx];
        seq.steps[idx] = tmp;
        saveState(); renderView();
      }}, el('span', {html:icon('chevLeft',12), style:{transform:'rotate(90deg)'}})),
      el('button', {class:'btn btn-sm', title:'Move down', onclick: e => {
        e.stopPropagation();
        if (idx === seq.steps.length - 1) return;
        const tmp = seq.steps[idx + 1];
        seq.steps[idx + 1] = seq.steps[idx];
        seq.steps[idx] = tmp;
        saveState(); renderView();
      }}, el('span', {html:icon('chevRight',12), style:{transform:'rotate(90deg)'}})),
      el('button', {class:'btn btn-sm', title:'Delete step', onclick: e => {
        e.stopPropagation();
        if (!confirm('Delete step ' + (idx + 1) + '?')) return;
        seq.steps.splice(idx, 1);
        saveState(); renderView();
        toast('Step deleted');
      }}, el('span', {html:icon('trash',12)}))
    )
  );
}

function openStepTypePicker(seq) {
  const body = el('div', {});
  const footer = el('div', {style:{marginLeft:'auto'}},
    el('button', {class:'btn', onclick: closeModal}, 'Cancel')
  );

  const types = [
    {id:'email',     name:'Email',       desc:'Send an email from this sequence',       color:'var(--info)',   ico:'mail'},
    {id:'wait',      name:'Wait',        desc:'Pause N days before the next step',      color:'var(--text-3)', ico:'calendar'},
    {id:'linkedin',  name:'LinkedIn',    desc:'Connect, message, or engage with a post',color:'#0A66C2',       ico:'linkedin'},
    {id:'task',      name:'Manual task', desc:'Create a task for the owner to do',      color:'var(--plum)',   ico:'check'},
    {id:'condition', name:'Condition',   desc:'Branch on reply / open / click',         color:'var(--warning)',ico:'filter'},
  ];

  body.append(el('div', {style:{fontSize:'12.5px', color:'var(--text-3)', marginBottom:'6px'}}, 'Pick a step type:'));
  body.append(el('div', {class:'step-type-picker'}, ...types.map(t => el('div', {
    class:'step-type-opt',
    onclick: () => {
      let newStep = {id: uuid(), type: t.id};
      if (t.id === 'email')     newStep = {...newStep, subject:'', body:'Hi {{first_name}},\n\n', sent:0, opened:0, replied:0};
      if (t.id === 'wait')      newStep = {...newStep, days:3};
      if (t.id === 'linkedin')  newStep = {...newStep, action:'connect', note:''};
      if (t.id === 'task')      newStep = {...newStep, title:''};
      if (t.id === 'condition') newStep = {...newStep, test:'no-reply', ifTrue:'pause', note:''};
      seq.steps.push(newStep);
      saveState();
      closeModal();
      renderView();
      // Open the editor immediately
      setTimeout(() => openStepEditor(seq, newStep, seq.steps.length - 1), 50);
    },
  },
    el('div', {class:'step-type-opt-ico', style:{background: t.color}}, el('span', {html:icon(t.ico, 16)})),
    el('div', {class:'step-type-opt-name'}, t.name),
    el('div', {class:'step-type-opt-desc'}, t.desc)
  ))));

  openModal({title:['Add a ', el('em',{}, 'step')], body, footer});
}

function openStepEditor(seq, step, idx) {
  const draft = {...step};
  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%', alignItems:'center'}});

  function render() {
    body.innerHTML = '';
    body.append(el('div', {style:{fontSize:'11px', color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:'500', marginBottom:'10px'}},
      'Step ' + (idx + 1) + ' · ' + step.type
    ));
    if (draft.type === 'email') {
      body.append(
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Subject'),
          el('input', {class:'input', value: draft.subject || '',
            placeholder: 'Use {{first_name}}, {{company}}, {{title}} as merge variables',
            oninput: e => { draft.subject = e.target.value; }})
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Body'),
          el('textarea', {class:'input',
            style:{minHeight:'200px', fontFamily:'var(--font-body)', fontSize:'13px', lineHeight:'1.55', resize:'vertical'},
            oninput: e => { draft.body = e.target.value; },
          }, draft.body || '')
        ),
        el('div', {style:{display:'flex', gap:'6px', flexWrap:'wrap', fontSize:'11px', color:'var(--text-3)'}},
          'Merge variables:',
          ['first_name','last_name','company','title','sender_name'].map(v =>
            el('span', {class:'mono', style:{padding:'1px 6px', background:'var(--surface-2)', borderRadius:'3px'}}, '{{' + v + '}}')
          )
        ),
        el('button', {class:'btn btn-sm', style:{marginTop:'10px'},
          onclick: async () => {
            if (!llm.isConfigured()) { toast('Add an AI API key in Settings first', {kind:'error', icon:'alert'}); return; }
            toast('Drafting via AI…');
            const sample = state.prospects[0] || {name:'Jane Doe', title:'VP Programs', company:'Example Org'};
            try {
              const out = await llm.draftEmail({prospect: sample, intent: 'Sequence step ' + (idx+1) + ' · ' + (draft.subject || 'cold outreach'), lengthHint:'short'});
              draft.body = out;
              render();
            } catch (e) { toast('AI error: ' + e.message, {kind:'error', icon:'alert', duration:5000}); }
          },
        }, el('span', {html:icon('sparkles',12)}), 'AI draft body')
      );
    } else if (draft.type === 'wait') {
      body.append(el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Wait days'),
        el('input', {class:'input', type:'number', min:1, max:60, value: draft.days || 3,
          oninput: e => { draft.days = parseInt(e.target.value) || 1; }})
      ));
    } else if (draft.type === 'linkedin') {
      body.append(
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Action'),
          buildSelect(draft.action || 'connect', ['connect','message','view-profile','engage-post'],
            v => ({connect:'Send connection request', message:'Send DM', 'view-profile':'View profile', 'engage-post':'Like & comment'})[v],
            v => { draft.action = v; })
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Note to the owner'),
          el('input', {class:'input', value: draft.note || '',
            placeholder:'e.g., Reference their post about Q3 program expansion',
            oninput: e => { draft.note = e.target.value; }})
        )
      );
    } else if (draft.type === 'task') {
      body.append(el('div', {class:'form-row'},
        el('label', {class:'form-label'}, 'Task title'),
        el('input', {class:'input', value: draft.title || '',
          placeholder:'e.g., Call prospect to confirm timeline',
          oninput: e => { draft.title = e.target.value; }})
      ));
    } else if (draft.type === 'condition') {
      body.append(
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Condition'),
          buildSelect(draft.test || 'no-reply', ['no-reply','no-open','replied','clicked'],
            v => ({'no-reply':'No reply in last 7 days', 'no-open':'No open in last 7 days', replied:'Replied', clicked:'Clicked a link'})[v],
            v => { draft.test = v; })
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'If true, then'),
          buildSelect(draft.ifTrue || 'pause', ['pause','skip-next','advance','assign-task'],
            v => ({pause:'Pause sequence for this prospect', 'skip-next':'Skip the next step', advance:'Advance to next step immediately', 'assign-task':'Create a task'})[v],
            v => { draft.ifTrue = v; })
        ),
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Note'),
          el('input', {class:'input', value: draft.note || '',
            oninput: e => { draft.note = e.target.value; }})
        )
      );
    }
  }

  footer.append(
    el('button', {class:'btn btn-danger',
      onclick: () => {
        if (!confirm('Delete this step?')) return;
        seq.steps.splice(idx, 1);
        saveState(); closeModal(); renderView();
        toast('Step deleted');
      },
    }, el('span', {html:icon('trash',13)}), 'Delete step'),
    el('div', {style:{flex:'1'}}),
    el('button', {class:'btn', onclick: closeModal}, 'Cancel'),
    el('button', {class:'btn btn-primary', onclick: () => {
      seq.steps[idx] = draft;
      saveState(); closeModal(); renderView();
      toast('Step saved');
    }}, el('span', {html:icon('check',13)}), 'Save step')
  );

  render();
  openModal({
    title: ['Edit ', el('em',{}, 'step ' + (idx + 1))],
    body, footer, size:'lg',
  });
}

/* ── Lead Scoring view ── */
function renderScoring(root) {
  const cfg = state.scoringConfig || defaultScoringConfig();
  // Compute scores for all prospects
  const scored = state.prospects.map(p => ({p, s: computeProspectScore(p, cfg)}));
  // Tier distribution
  const dist = {};
  for (const t of cfg.tiers) dist[t.id] = 0;
  for (const {s} of scored) dist[s.tier.id]++;
  const maxDist = Math.max(1, ...Object.values(dist));

  const avgScore = scored.length ? Math.round(scored.reduce((sum, x) => sum + x.s.total, 0) / scored.length) : 0;
  const salesReady = scored.filter(x => x.s.total >= cfg.salesReadyThreshold).length;
  const hotOrReady = scored.filter(x => x.s.total >= 61).length;

  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Lead ', el('em',{}, 'scoring')),
      el('div', {class:'page-subtitle'}, state.prospects.length + ' prospects · avg ' + avgScore + ' · ' + salesReady + ' sales-ready')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn', onclick: () => {
        // Trigger recompute — scores are computed live, but this refreshes the view
        toast('Scores recomputed for ' + state.prospects.length + ' prospects');
        renderView();
      }}, el('span', {html:icon('refresh',14)}), 'Recalculate all'),
      el('button', {class:'btn btn-primary', onclick: () => openScoringConfig()},
        el('span', {html:icon('edit',14)}), 'Configure weights')
    )
  ));

  // KPI strip
  root.append(el('div', {class:'pipe-kpi-strip'},
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Avg score'),
      el('div', {class:'pipe-kpi-value'}, String(avgScore)),
      el('div', {class:'pipe-kpi-sub'}, 'across ' + state.prospects.length + ' prospects')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Sales ready'),
      el('div', {class:'pipe-kpi-value'}, String(salesReady)),
      el('div', {class:'pipe-kpi-sub'}, '≥ ' + cfg.salesReadyThreshold + ' points')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Hot + Ready'),
      el('div', {class:'pipe-kpi-value'}, String(hotOrReady)),
      el('div', {class:'pipe-kpi-sub'}, '≥ 61 points')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Max possible'),
      el('div', {class:'pipe-kpi-value'}, String(cfg.firmographic.maxPoints + cfg.behavioral.maxPoints + cfg.aiFit.maxPoints)),
      el('div', {class:'pipe-kpi-sub'}, cfg.firmographic.maxPoints + ' + ' + cfg.behavioral.maxPoints + ' + ' + cfg.aiFit.maxPoints)
    )
  ));

  // Distribution histogram
  const histCard = el('div', {class:'card', style:{marginBottom:'16px'}},
    el('div', {class:'card-header'}, el('div', {class:'card-title'}, 'Tier distribution'))
  );
  const histBody = el('div', {class:'card-body'});
  for (const t of cfg.tiers) {
    const count = dist[t.id];
    const pct = (count / maxDist) * 100;
    histBody.append(el('div', {style:{display:'grid', gridTemplateColumns:'120px 1fr 80px', gap:'14px', alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--border-soft)'}},
      el('div', {}, el('span', {class:'tier-badge ' + t.cls}, t.label), el('div', {style:{fontSize:'10.5px', color:'var(--text-3)', marginTop:'2px'}}, t.min + '–' + t.max + ' pts')),
      el('div', {class:'rep-bar'}, el('div', {class:'rep-bar-fill ' + (t.cls === 'ready' ? 'high' : t.cls === 'hot' ? 'low' : t.cls === 'warm' ? 'mid' : 'miss'), style:{width: Math.max(pct, 2) + '%'}})),
      el('div', {style:{textAlign:'right', fontFamily:'var(--font-display)', fontSize:'18px', fontVariantNumeric:'tabular-nums'}}, String(count))
    ));
  }
  histCard.append(histBody);
  root.append(histCard);

  // Top-scoring prospects table

    )
  );
  scored.sort((a,b) => b.s.total - a.s.total);
  const topBody = el('div', {});
  for (const {p, s} of scored.slice(0, 15)) {

        )
      ),

      )
    ));
  }
  topCard.append(topBody);
  root.append(topCard);
}

function scoreBar(cls, label, val, max) {
  const pct = max ? (val / max * 100) : 0;
  return el('div', {style:{fontSize:'11px'}},
    el('div', {style:{display:'flex', justifyContent:'space-between', color:'var(--text-3)'}},
      el('span', {}, label),
      el('span', {style:{fontVariantNumeric:'tabular-nums'}}, val + '/' + max)
    ),
    el('div', {class:'score-bar'}, el('div', {class:'score-bar-fill ' + cls, style:{width: Math.max(pct, 2) + '%'}}))
  );
}

/* ══════════ AI Research-to-Email Pipeline (Option 2) ══════════ */
function renderResearch(root) {

  const approved = state.emailDrafts.filter(d => d.status === 'approved');
  const sent     = state.emailDrafts.filter(d => d.status === 'sent');
  const rejected = state.emailDrafts.filter(d => d.status === 'rejected');

  root.append(el('div', {class:'page-header'},

    ),

      el('div', {class:'pipe-kpi-sub'}, 'awaiting your review')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Approved'),
      el('div', {class:'pipe-kpi-value'}, String(approved.length)),
      el('div', {class:'pipe-kpi-sub'}, 'ready to send')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Sent'),

function renderResearchPipeline(root) {
  // Prospect picker + stage progress + outputs
  const pickerWrap = el('div', {class:'card', style:{marginBottom:'16px'}});
  const pickerBody = el('div', {class:'card-body'});
  pickerBody.append(
    el('div', {style:{fontSize:'12.5px', color:'var(--text-3)', marginBottom:'14px', lineHeight:'1.55'}},
      'Pick a prospect to run through the 4-stage AI research pipeline: ',
      el('b', {}, 'Organization + Contact research'), ' → ',
      el('b', {}, 'Fit scoring'), ' → ',
      el('b', {}, 'Three email variants'), ' (ROI / Pain-point / Social proof) → ',
      el('b', {}, 'Approval queue'), '.',
      el('br',{}),
      el('span', {style:{color:'var(--warning)'}}, 'Heads up: '),
      'One full run = 4 AI calls (~$0.02–0.04 at Claude Sonnet 4 pricing).'
    )
  );

  // Prospect picker
  const scored = state.prospects.map(p => ({p, s: computeProspectScore(p)})).sort((a,b) => b.s.total - a.s.total);
  const defaultProspect = state.researchProspectId ? state.prospects.find(x => x.id === state.researchProspectId) : scored[0] ? scored[0].p : null;
  if (defaultProspect && !state.researchProspectId) state.researchProspectId = defaultProspect.id;

  pickerBody.append(
    el('div', {class:'form-row'},
      el('label', {class:'form-label'}, 'Prospect'),
      el('select', {
        class:'input',
        onchange: e => {
          state.researchProspectId = e.target.value;
          // Reset pipeline state for new prospect
          state.researchResult = null;
          state.researchVariants = null;
          state.researchStage = 0;
          saveState(); renderView();
        },
      },
        ...scored.slice(0, 200).map(({p, s}) => {
          const o = el('option', {value: p.id}, p.name + ' · ' + (p.title || '—') + ' · ' + p.company + ' · ' + s.tier.label + ' ' + s.total);
          if (state.researchProspectId === p.id) o.setAttribute('selected', 'selected');
          return o;
        })
      )
    ),
    el('div', {style:{display:'flex', gap:'8px'}},
      el('button', {
        class:'btn btn-primary',
        disabled: (state.researchLoading || !state.researchProspectId) ? 'disabled' : null,
        onclick: async () => { await runResearchPipeline(state.researchProspectId); }
      },
        el('span', {html:icon('sparkles',13)}),
        state.researchLoading ? 'Running…' : 'Run full pipeline'
      ),
      state.researchResult ? el('button', {class:'btn', onclick: () => {
        state.researchResult = null;
        state.researchVariants = null;
        state.researchStage = 0;
        saveState(); renderView();
      }}, 'Reset') : null
    )
  );
  pickerWrap.append(pickerBody);
  root.append(pickerWrap);

  if (!state.researchProspectId) return;
  const prospect = state.prospects.find(x => x.id === state.researchProspectId);
  if (!prospect) return;

  // Stage progress bar
  const stage = state.researchStage || 0; // 0=idle, 1=researching, 2=research done, 3=drafting emails, 4=done
  root.append(renderStageBar(stage));

  // Output panel
  const shell = el('div', {class:'research-shell'});
  shell.append(el('div', {class:'research-head'},
    el('div', {class:'research-head-main'},
      el('div', {style:{fontSize:'11.5px', color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:'500', marginBottom:'4px'}}, 'Pipeline target'),
      el('h2', {style:{fontFamily:'var(--font-display)', fontSize:'22px', fontWeight:'400', letterSpacing:'-0.01em', lineHeight:'1.2', margin:'0 0 4px'}},
        prospect.name, ' · ', el('em', {style:{color:'var(--accent)'}}, prospect.company)
      ),
      el('div', {style:{fontSize:'13px', color:'var(--text-3)'}},
        (prospect.title || '—'), ' · ', prospect.email || 'no email'
      )
    )
  ));

  if (state.researchResult) {
    const r = state.researchResult;
    if (r.error) {
      shell.append(el('div', {style:{padding:'14px', background:'var(--danger-bg)', border:'1px solid var(--danger-soft)', borderRadius:'var(--radius-md)', fontSize:'12.5px', color:'var(--danger)'}},
        el('b', {}, 'Research failed: '), r.error,
        r.raw ? el('pre', {class:'mono', style:{marginTop:'6px', fontSize:'11px', whiteSpace:'pre-wrap', background:'var(--surface)'}}, r.raw.slice(0, 400)) : null
      ));
    } else {
      // Organization
      shell.append(el('div', {class:'research-out'},
        el('div', {class:'research-out-head'}, el('span', {html:icon('building',11)}), 'Organization research'),
        el('div', {class:'research-out-body'}, r.organizationSummary || '—')
      ));
      // Contact
      shell.append(el('div', {class:'research-out'},
        el('div', {class:'research-out-head'}, el('span', {html:icon('users',11)}), 'Contact profile'),
        el('div', {class:'research-out-body'}, r.contactProfile || '—')
      ));
      // Top priorities
      if (r.topPriorities && r.topPriorities.length) {
        shell.append(el('div', {class:'research-out'},
          el('div', {class:'research-out-head'}, el('span', {html:icon('zap',11)}), 'Top priorities'),
          el('div', {class:'research-out-body'}, el('ul', {}, ...r.topPriorities.map(p => el('li', {}, p))))
        ));
      }
      // Fit score
      const fitColor = r.fitScore >= 70 ? 'var(--success)' : r.fitScore >= 45 ? 'var(--warning)' : 'var(--danger)';
      shell.append(el('div', {class:'research-fit-score'},
        el('div', {class:'research-fit-val', style:{color: fitColor}}, String(r.fitScore || 0)),
        el('div', {class:'research-fit-label'},
          el('div', {class:'research-fit-title'}, 'ICP Fit score · updates lead scoring'),
          el('div', {class:'research-fit-reason'}, r.fitReasoning || '—'),
          r.recommendedAngle ? el('div', {style:{fontSize:'12px', color:'var(--text-3)', marginTop:'4px', fontStyle:'italic'}}, 'Angle: ' + r.recommendedAngle) : null
        )
      ));
    }
  } else if (!state.researchLoading) {
    shell.append(el('div', {style:{padding:'40px 20px', textAlign:'center', color:'var(--text-3)', fontSize:'13px'}},
      'Click "Run full pipeline" to begin research.'
    ));
  }

  // Variants
  if (state.researchVariants) {
    shell.append(el('div', {style:{marginTop:'16px', paddingTop:'16px', borderTop:'1px solid var(--border-soft)'}},
      el('div', {style:{fontSize:'11.5px', color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:'600', marginBottom:'8px'}}, 'Three email variants — pick one, all, or none'),
      el('div', {class:'variant-grid'},
        renderVariantCard(prospect, state.researchVariants.roi,    'roi',    'ROI-focused'),
        renderVariantCard(prospect, state.researchVariants.pain,   'pain',   'Pain-point'),
        renderVariantCard(prospect, state.researchVariants.social, 'social', 'Social proof')
      )
    ));
  }

  root.append(shell);
}

function renderStageBar(stage) {
  const stages = [
    {n:1, label:'Research'},
    {n:2, label:'Fit score'},
    {n:3, label:'Draft emails'},
    {n:4, label:'Queue'},
  ];
  const bar = el('div', {class:'stage-bar'});
  for (const s of stages) {
    const cls = stage >= s.n ? (stage === s.n && stage !== 4 ? 'active' : 'done') : '';
    bar.append(el('div', {class:'stage-item '+cls},
      el('span', {class:'stage-ico'}, stage > s.n ? el('span',{html:icon('check',9)}) : String(s.n)),
      s.label
    ));
  }
  return bar;
}

function renderVariantCard(prospect, variant, tagCls, tagLabel) {
  if (!variant) return el('div', {class:'variant-card'},
    el('div', {style:{margin:'auto', color:'var(--text-3)', fontSize:'12px'}}, '—')
  );
  if (variant.error) return el('div', {class:'variant-card'},
    el('div', {class:'variant-card-head'}, el('span', {class:'variant-tag '+tagCls}, tagLabel)),
    el('div', {style:{fontSize:'12px', color:'var(--danger)'}}, variant.error)
  );
  return el('div', {class:'variant-card'},
    el('div', {class:'variant-card-head'},
      el('span', {class:'variant-tag '+tagCls}, tagLabel)
    ),
    el('div', {class:'variant-subject'}, variant.subject || '(no subject)'),
    el('div', {class:'variant-body'}, variant.body || '—'),
    el('div', {class:'variant-actions'},
      el('button', {class:'btn btn-sm btn-primary', style:{flex:'1'},
        onclick: () => approveDraft(prospect, variant, tagCls, tagLabel)
      }, el('span', {html:icon('check',12)}), 'Approve'),
      el('button', {class:'btn btn-sm',
        onclick: () => {
          navigator.clipboard.writeText((variant.subject || '') + '\n\n' + (variant.body || ''))
            .then(() => toast('Copied to clipboard'));
        }
      }, el('span', {html:icon('copy',12)}))
    )
  );
}

async function runResearchPipeline(prospectId) {
  const prospect = state.prospects.find(x => x.id === prospectId);
  if (!prospect) return;
  if (!llm.isConfigured()) { toast('Configure an AI API key in Settings first', {kind:'error', icon:'alert'}); return; }

  state.researchLoading = true;
  state.researchStage = 1;
  state.researchResult = null;
  state.researchVariants = null;
  saveState(); renderView();
  toast('Researching ' + prospect.name + '…');

  let research;
  try {
    research = await llm.researchProspect(prospect);
  } catch (e) {
    state.researchLoading = false;
    state.researchStage = 0;
    saveState(); renderView();
    toast('Research failed: ' + e.message, {kind:'error', icon:'alert', duration:6000});
    return;
  }

  state.researchResult = research;
  state.researchStage = 2;
  // Write fitScore back to prospect so scoring engine picks it up
  if (!research.error && typeof research.fitScore === 'number') {
    prospect.aiFitScore = research.fitScore;
    prospect.lastResearchAt = new Date().toISOString();
  }
  saveState(); renderView();

  if (research.error) {
    state.researchLoading = false;
    saveState(); renderView();
    return;
  }

  // Stage 3+: generate 3 variants in parallel
  state.researchStage = 3;
  saveState(); renderView();
  toast('Drafting three email variants…');

  try {
    const [roi, pain, social] = await Promise.all([
      llm.generateEmailVariants({prospect, research, variant: 'roi'}),
      llm.generateEmailVariants({prospect, research, variant: 'pain'}),
      llm.generateEmailVariants({prospect, research, variant: 'social'}),
    ]);
    state.researchVariants = {roi, pain, social};
    state.researchStage = 4;
  } catch (e) {
    toast('Email generation failed: ' + e.message, {kind:'error', icon:'alert', duration:6000});
  }
  state.researchLoading = false;
  saveState(); renderView();
  toast('Pipeline complete — review the variants and approve one');
}

function approveDraft(prospect, variant, variantCls, variantLabel) {
  if (!state.emailDrafts) state.emailDrafts = [];
  state.emailDrafts.unshift({
    id: uuid(),
    prospectId: prospect.id,
    variantKind: variantCls,
    variantLabel: variantLabel,
    subject: variant.subject || '',
    body: variant.body || '',
    status: 'approved',
    createdAt: new Date().toISOString(),
  });
  saveState();
  toast('Queued for approval — go to Approval queue to send');
}

function renderApprovalQueue(root) {
  const TABS = [
    {id:'draft',    label:'Draft'},
    {id:'approved', label:'Approved'},
    {id:'sent',     label:'Sent'},
    {id:'rejected', label:'Rejected'},
  ];
  if (!state.approvalTab) state.approvalTab = 'approved';

  const filtered = state.emailDrafts.filter(d => d.status === state.approvalTab);

  const tabBar = el('div', {class:'sig-tabs', style:{marginBottom:'16px', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}});
  for (const t of TABS) {
    const cnt = state.emailDrafts.filter(d => d.status === t.id).length;
    tabBar.append(el('button', {
      class:'sig-tab'+(state.approvalTab===t.id?' active':''),
      onclick: () => { state.approvalTab = t.id; renderView(); },
    },
      t.label,
      el('span', {class:'count'}, '· ' + cnt)
    ));
  }
  root.append(tabBar);

  if (!filtered.length) {
    root.append(el('div', {class:'card'}, el('div', {class:'empty', style:{padding:'40px 20px'}},
      el('div', {style:{fontSize:'14px', color:'var(--text-2)', marginBottom:'6px'}}, 'Nothing in ' + state.approvalTab + ' yet'),
      el('div', {style:{fontSize:'12.5px', color:'var(--text-3)'}},
        state.approvalTab === 'draft' || state.approvalTab === 'approved'
          ? 'Run the research pipeline on a prospect and approve a variant to populate this queue.'
          : 'Approved emails marked as sent or rejected show up here.'
      )
    )));
    return;
  }

  for (const draft of filtered) {
    const p = state.prospects.find(x => x.id === draft.prospectId);
    if (!p) continue;
    root.append(el('div', {class:'approval-row'},
      el('div', {},
        el('div', {class:'avatar', style:{background: avatarColor(p.name)}}, initials(p.name)),
        el('div', {style:{textAlign:'center', marginTop:'6px'}},
          el('span', {class:'variant-tag ' + draft.variantKind}, draft.variantLabel)
        )
      ),
      el('div', {class:'approval-main'},
        el('div', {class:'approval-subject'}, draft.subject || '(no subject)'),
        el('div', {class:'approval-to'},
          'To: ', el('b', {}, p.name),
          ' · ', (p.email || 'no email'),
          ' · ', p.company,
          ' · ', el('span', {class:'approval-status ' + draft.status}, draft.status)
        ),
        el('div', {class:'approval-preview'}, draft.body || '—')
      ),
      el('div', {class:'approval-actions'},
        draft.status === 'approved' ? el('button', {class:'btn btn-sm btn-accent',
          onclick: () => {
            draft.status = 'sent';
            draft.sentAt = new Date().toISOString();
            saveState(); renderView();
            toast('Marked as sent — in production this would hit your SendGrid relay');
          }
        }, el('span',{html:icon('send',12)}), 'Send') : null,
        draft.status !== 'rejected' && draft.status !== 'sent' ? el('button', {class:'btn btn-sm',
          onclick: () => {
            if (p && p.email) openAIComposer({prospect: p, intent: draft.body.slice(0, 200)});
          }
        }, el('span',{html:icon('edit',12)}), 'Edit') : null,
        draft.status !== 'rejected' ? el('button', {class:'btn btn-sm',
          onclick: () => {
            if (!confirm('Reject this draft?')) return;
            draft.status = 'rejected';
            saveState(); renderView();
          }
        }, el('span',{html:icon('x',12)}), 'Reject') : null
      )
    ));
  }
}

function renderCustomers(root) {
  const customers = state.customers || [];
  const critical = customers.filter(c => c.health.tier === 'critical').length;
  const atRisk   = customers.filter(c => c.health.tier === 'atrisk').length;
  const healthy  = customers.filter(c => c.health.tier === 'healthy').length;
  const totalARR = customers.reduce((s, c) => s + c.arr, 0);
  const atRiskARR = customers.filter(c => c.health.tier === 'critical' || c.health.tier === 'atrisk').reduce((s, c) => s + c.arr, 0);

  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Customer ', el('em', {}, 'success')),
      el('div', {class:'page-subtitle'}, customers.length + ' active customers · ' + fmtMoney(totalARR) + ' in ARR · ' + critical + ' critical · ' + atRisk + ' at risk')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn', onclick: () => navigate('renewals')}, el('span', {html:icon('calendar',14)}), 'Renewals'),
      el('button', {class:'btn', onclick: () => navigate('qbrs')}, el('span', {html:icon('calendar',14)}), 'QBRs')
    )
  ));

  // KPI strip
  root.append(el('div', {class:'pipe-kpi-strip'},
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Total ARR'),
      el('div', {class:'pipe-kpi-value'}, fmtMoney(totalARR)),
      el('div', {class:'pipe-kpi-sub'}, customers.length + ' active customers')
    ),
    el('div', {class:'pipe-kpi k-risk'},
      el('div', {class:'pipe-kpi-label'}, 'ARR at risk'),
      el('div', {class:'pipe-kpi-value'}, fmtMoney(atRiskARR)),
      el('div', {class:'pipe-kpi-sub'}, (critical + atRisk) + ' accounts flagged')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Healthy'),
      el('div', {class:'pipe-kpi-value'}, String(healthy)),
      el('div', {class:'pipe-kpi-sub'}, 'Score ≥ 80')
    ),
    el('div', {class:'pipe-kpi'},
      el('div', {class:'pipe-kpi-label'}, 'Renewals ≤ 90d'),
      el('div', {class:'pipe-kpi-value'}, String(customers.filter(c => c.daysToRenewal >= 0 && c.daysToRenewal <= 90).length)),
      el('div', {class:'pipe-kpi-sub'}, 'in the renewal window')
    )
  ));

  // Filter tabs
  if (!state.customersTab) state.customersTab = 'all';
  const tabs = [
    {id:'all', label:'All', count: customers.length},
    {id:'critical', label:'Critical', count: critical},
    {id:'atrisk', label:'At Risk', count: atRisk},
    {id:'watch', label:'Watch', count: customers.filter(c=>c.health.tier==='watch').length},
    {id:'healthy', label:'Healthy', count: healthy},
  ];
  const tabBar = el('div', {class:'sig-tabs', style:{marginBottom:'16px', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}});
  for (const t of tabs) {
    tabBar.append(el('button', {
      class:'sig-tab'+(state.customersTab===t.id?' active':''),
      onclick: () => { state.customersTab = t.id; renderView(); },
    }, t.label, el('span', {class:'count'}, '· ' + t.count)));
  }
  root.append(tabBar);

  const filtered = state.customersTab === 'all' ? customers : customers.filter(c => c.health.tier === state.customersTab);
  if (!filtered.length) {
    root.append(el('div', {class:'card'}, el('div', {class:'empty', style:{padding:'40px'}}, 'No customers in this category.')));
    return;
  }
  filtered.sort((a, b) => a.health.total - b.health.total);

  for (const c of filtered) {
    const company = state.companies.find(co => co.id === c.companyId);
    const cls = c.health.tier === 'critical' ? 'c-critical' : c.health.tier === 'atrisk' ? 'c-atrisk' : c.health.tier === 'watch' ? 'c-watch' : '';
    const daysLabel = c.daysToRenewal < 0 ? 'Past renewal' : c.daysToRenewal + 'd to renewal';
    const daysCls = c.daysToRenewal < 0 ? 'urgent' : c.daysToRenewal < 30 ? 'urgent' : c.daysToRenewal < 90 ? 'soon' : '';
    root.append(el('div', {class:'cs-health-card '+cls, onclick: () => openCustomer(c.id)},
      el('div', {class:'cs-logo', style:{background: company ? company.color : 'var(--accent)'}}, c.companyName[0]),
      el('div', {class:'cs-main'},
        el('div', {class:'cs-name'}, c.companyName,
          el('span', {class:'health-badge '+c.health.tier}, c.health.tier === 'atrisk' ? 'At Risk' : c.health.tier)
        ),
        el('div', {class:'cs-sub'},
          'CSM ' + c.csmOwner + ' · ARR ' + fmtMoney(c.arr) + ' · ',
          el('span', {class: daysCls ? 'cs-days '+daysCls : '', style: daysCls==='urgent'?{color:'var(--danger)',fontWeight:'600'}:daysCls==='soon'?{color:'var(--warning)',fontWeight:'500'}:{}}, daysLabel)
        )
      ),
      el('div', {class:'cs-stats'},
        el('div', {},
          el('div', {class:'cs-stat-val'}, String(c.health.total)),
          el('div', {class:'cs-stat-label'}, 'Health')
        ),
        el('div', {},
          el('div', {class:'cs-stat-val'}, String(c.tickets.filter(t => t.status === 'open').length)),
          el('div', {class:'cs-stat-label'}, 'Open tickets')
        ),
        el('div', {},

          el('div', {class:'cs-stat-label'}, 'NPS')
        )
      )
    ));
  }
}

  const cls = value >= 70 ? 'good' : value >= 40 ? 'mid' : 'bad';
  return el('div', {class:'health-comp'},
    el('div', {class:'health-comp-label'}, label),
    el('div', {class:'health-comp-val'}, String(Math.round(value))),
    el('div', {class:'health-comp-bar'}, el('div', {class:'health-comp-fill '+cls, style:{width: Math.max(2, value) + '%'}})),
    subtext ? el('div', {style:{fontSize:'10px', color:'var(--text-3)', marginTop:'4px'}}, subtext) : null

function renderRenewals(root) {
  const customers = state.customers || [];
  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Renewal ', el('em', {}, 'pipeline')),
      el('div', {class:'page-subtitle'}, customers.filter(c => c.daysToRenewal <= 90 && c.daysToRenewal >= 0).length + ' renewals in the next 90 days')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn', onclick: () => navigate('customers')},
        el('span', {html:icon('chevLeft',13)}), 'All customers')
    )
  ));

  const stages = [
    {id:'upcoming',    label:'Upcoming (>90d)',  color:'var(--text-muted)'},
    {id:'approaching', label:'Approaching (<90d)', color:'var(--info)'},
    {id:'negotiation', label:'In negotiation',   color:'var(--accent)'},
    {id:'atrisk',      label:'At risk',          color:'var(--warning)'},
    {id:'renewed',     label:'Renewed / Churned',color:'var(--success)'},
  ];

  const buckets = {upcoming:[], approaching:[], negotiation:[], atrisk:[], renewed:[]};
  for (const c of customers) {
    if (c.renewalStage === 'churned' || c.renewalStage === 'renewed') buckets.renewed.push(c);
    else if (c.renewalStage === 'atrisk') buckets.atrisk.push(c);
    else if (c.renewalStage === 'negotiation') buckets.negotiation.push(c);
    else if (c.daysToRenewal <= 90) buckets.approaching.push(c);
    else buckets.upcoming.push(c);
  }

  const kb = el('div', {class:'renewal-kb'});
  for (const st of stages) {
    const col = el('div', {class:'renewal-col'});
    const list = buckets[st.id] || [];
    const totalARR = list.reduce((s, c) => s + c.arr, 0);
    col.append(el('div', {class:'renewal-col-head'},
      el('div', {style:{width:'8px', height:'8px', borderRadius:'50%', background: st.color}}),
      el('div', {class:'renewal-col-name'}, st.label),
      el('div', {class:'renewal-col-count'}, String(list.length))
    ));
    col.append(el('div', {style:{fontSize:'10.5px', color:'var(--text-3)', marginBottom:'8px', fontVariantNumeric:'tabular-nums'}}, fmtMoney(totalARR) + ' ARR'));

    list.sort((a,b) => a.daysToRenewal - b.daysToRenewal);
    for (const c of list) {
      const dCls = c.daysToRenewal < 0 ? 'urgent' : c.daysToRenewal < 30 ? 'urgent' : c.daysToRenewal < 90 ? 'soon' : '';
      col.append(el('div', {class:'renewal-card', onclick: () => openCustomer(c.id)},
        el('div', {class:'renewal-company'}, c.companyName),
        el('div', {class:'renewal-arr'}, fmtMoney(c.arr)),
        el('div', {class:'renewal-date '+dCls},
          el('span', {html:icon('calendar',10)}),
          c.daysToRenewal < 0 ? Math.abs(c.daysToRenewal) + 'd past' : c.daysToRenewal + 'd'
        ),
        el('div', {style:{marginTop:'6px'}},
          el('span', {class:'health-badge '+c.health.tier, style:{fontSize:'9.5px'}}, c.health.tier === 'atrisk' ? 'At Risk' : c.health.tier)
        )
      ));
    }
    if (!list.length) col.append(el('div', {style:{fontSize:'11.5px', color:'var(--text-3)', textAlign:'center', padding:'20px 0'}}, 'Empty'));
    kb.append(col);
  }
  root.append(kb);
}

function openScheduleQBRModal(customer) {
  const draft = {
    companyName: customer ? customer.companyName : '',
    csmOwner: customer ? customer.csmOwner : 'Tess Halliwell',
    scheduledAt: new Date(Date.now() + 14 * 86400000).toISOString(),
    agenda: 'Quarterly review · goals, wins, blockers, renewal prep',
    attendees: ['Idris Grant'],
    status: 'upcoming',
    notes: '',
    outcome: null,
  };

  const body = el('div', {});
  const footer = el('div', {style:{display:'flex', gap:'8px', width:'100%'}});

  function render() {
    body.innerHTML = '';
    const customerOptions = (state.customers || []).map(c => c.companyName);
    body.append(
      el('div', {class:'form-grid-2'},
        el('div', {class:'form-row'},
          el('label', {class:'form-label'}, 'Customer'),
          el('select', {class:'input', onchange: e => { draft.companyName = e.target.value; }},
            el('option', {value:''}, '— select —'),
            ...customerOptions.map(n => {
              const o = el('option', {value:n}, n);
              if (draft.companyName === n) o.setAttribute('selected', 'selected');

/* ══════════ Workflow Automation (Module 8) ══════════ */
function renderWorkflows(root) {
  const wfs = state.workflows || [];
  const enabled = wfs.filter(w => w.enabled).length;
  const totalFired = wfs.reduce((s,w) => s + (w.stats?.fired || 0), 0);

  root.append(el('div', {class:'page-header'},
    el('div', {},
      el('h1', {class:'page-title'}, 'Workflow ', el('em', {}, 'automation')),
      el('div', {class:'page-subtitle'}, wfs.length + ' rules · ' + enabled + ' enabled · ' + totalFired + ' triggers fired total')
    ),
    el('div', {class:'page-actions'},
      el('button', {class:'btn btn-primary', onclick: () => openWorkflowBuilder(null)},
        el('span', {html:icon('plus',14)}), 'New workflow')
    )
  ));

  if (!wfs.length) {
    root.append(el('div', {class:'card'}, el('div', {class:'empty', style:{padding:'40px'}}, 'No workflows yet. Click "New workflow" to add one.')));
    return;
  }

  // Education panel
  root.append(el('div', {class:'card', style:{marginBottom:'16px', padding:'14px 16px', fontSize:'12.5px', color:'var(--text-3)', lineHeight:'1.5'}},
    el('b', {style:{color:'var(--text-2)'}}, 'How this works: '),
    'Each rule is ', el('b', {}, 'trigger'), ' → ', el('b', {}, 'conditions'), ' → ', el('b', {}, 'actions'), '. ',
    'When the trigger fires (a prospect tier changes, a deal stalls, a customer\'s health drops), conditions are checked, and matching actions run. ',
    'In this build, triggers fire synthetically from state changes. In production, a cron on your AlmaLinux relay polls every minute and fires real Slack + task + email actions.'
  ));

  for (const w of wfs) {
    const triggerLabel = {
      'prospect.tier.changed': 'Prospect tier → ' + (w.trigger.to || '?'),
      'deal.stalled': 'Deal stalled ' + (w.trigger.days || 14) + '+ days',
      'customer.health.dropped': 'Customer health < ' + (w.trigger.below || 60),
      'customer.renewal.approaching': 'Renewal in ' + (w.trigger.days || 90) + 'd',
      'email.reply.positive': 'Positive email reply',
    }[w.trigger.type] || w.trigger.type;

    root.append(el('div', {class:'workflow-card'+(w.enabled?'':' disabled'), onclick: (e) => {
      // Don't open builder if clicking the toggle
      if (e.target.closest('.workflow-toggle')) return;
      openWorkflowBuilder(w);
    }},
      el('div', {class:'workflow-head'},
        el('div', {class:'workflow-toggle'+(w.enabled?' on':''),
          onclick: e => {
            e.stopPropagation();
            w.enabled = !w.enabled;
            saveState(); renderView();
            toast(w.name + (w.enabled ? ' enabled' : ' disabled'));
          }
        }),
        el('div', {class:'workflow-name'}, w.name),
        el('span', {class:'badge '+(w.enabled?'success':''), style:{fontSize:'10px'}}, w.enabled ? 'ACTIVE' : 'PAUSED')
      ),
      el('div', {class:'workflow-flow'},
        el('span', {class:'workflow-step-chip trigger'}, triggerLabel),
        w.conditions.length ? el('span', {class:'workflow-arrow'}, '→') : null,
        ...w.conditions.map(c => el('span', {class:'workflow-step-chip condition'},
          c.field + ' ' + c.op + ' ' + c.value
        )),
        el('span', {class:'workflow-arrow'}, '→'),
        ...w.actions.map(a => el('span', {class:'workflow-step-chip action'},
          ({
            'notify.slack': 'Slack → ' + (a.channel || 'default'),
            'task.create': 'Create task',
            'sequence.enroll': 'Enroll: ' + (a.sequenceName || 'sequence'),
            'deal.advance': 'Advance → ' + (a.toStage || 'next'),
            'qbr.schedule': 'Schedule QBR',
          })[a.type] || a.type
        ))
      ),
      el('div', {class:'workflow-stats'},
        el('span', {}, 'Fired: ', el('b', {style:{color:'var(--text-2)'}}, String(w.stats?.fired || 0))),
        w.stats?.lastFired ? el('span', {}, 'Last: ', el('b', {style:{color:'var(--text-2)'}}, relTime(w.stats.lastFired))) : null
      )
    ));
  }
}

function openWorkflowBuilder(existing) {
  const isEdit = !!existing;
  const draft = existing ? JSON.parse(JSON.stringify(existing)) : {
    id: uuid(),
    name: '',
    enabled: false,
    trigger: {type:'prospect.tier.changed', to:'hot'},
    conditions: [],
    actions: [{type:'notify.slack', channel:'#sales', template:''}],
    stats: {fired: 0, lastFired: null},
  };

  const TRIGGER_OPTIONS = [
    {id:'prospect.tier.changed',       label:'Prospect tier changes'},
    {id:'deal.stalled',                label:'Deal stalls in stage'},
    {id:'customer.health.dropped',     label:'Customer health drops'},
    {id:'customer.renewal.approaching',label:'Customer renewal approaches'},
    {id:'email.reply.positive',        label:'Positive email reply received'},
